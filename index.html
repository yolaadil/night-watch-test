<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch — Audio and Focus Guided Story</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
<script>
AFRAME.registerComponent('texture-blur', {
  schema: {
    amount: { type: 'number', default: 0 }
  },

  init() {
    this.originalMaterial = null;
    this.shaderMaterial = null;
    this.applyBlurMaterial = this.applyBlurMaterial.bind(this);

    this.el.addEventListener('materialtextureloaded', this.applyBlurMaterial);
    this.el.addEventListener('object3dset', this.applyBlurMaterial);
  },

  update() {
    if (this.shaderMaterial) {
      this.shaderMaterial.uniforms.blurAmount.value = this.data.amount;
    }
  },

  applyBlurMaterial() {
    const mesh = this.el.getObject3D('mesh');
    if (!mesh || !mesh.material || !mesh.material.map) return;

    const texture = mesh.material.map;
    const image = texture.image;
    if (!image || !image.width || !image.height) return;

    if (!this.originalMaterial) {
      this.originalMaterial = mesh.material;
    }

    if (this.shaderMaterial) {
      this.shaderMaterial.uniforms.map.value = texture;
      this.shaderMaterial.uniforms.resolution.value.set(
        image.width,
        image.height
      );
      mesh.material = this.shaderMaterial;
      return;
    }

    this.shaderMaterial = new THREE.ShaderMaterial({
      uniforms: {
        map: { value: texture },
        blurAmount: { value: this.data.amount },
        resolution: {
          value: new THREE.Vector2(image.width, image.height)
        }
      },

      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position =
            projectionMatrix *
            modelViewMatrix *
            vec4(position, 1.0);
        }
      `,

      fragmentShader: `
        uniform sampler2D map;
        uniform float blurAmount;
        uniform vec2 resolution;
        varying vec2 vUv;

        void main() {
          vec2 px = blurAmount / resolution;
          vec4 color = vec4(0.0);

          color += texture2D(map, vUv + px * vec2(-1.0, -1.0)) * 0.0625;
          color += texture2D(map, vUv + px * vec2( 0.0, -1.0)) * 0.1250;
          color += texture2D(map, vUv + px * vec2( 1.0, -1.0)) * 0.0625;
          color += texture2D(map, vUv + px * vec2(-1.0,  0.0)) * 0.1250;
          color += texture2D(map, vUv)                            * 0.2500;
          color += texture2D(map, vUv + px * vec2( 1.0,  0.0)) * 0.1250;
          color += texture2D(map, vUv + px * vec2(-1.0,  1.0)) * 0.0625;
          color += texture2D(map, vUv + px * vec2( 0.0,  1.0)) * 0.1250;
          color += texture2D(map, vUv + px * vec2( 1.0,  1.0)) * 0.0625;

          gl_FragColor = color;
        }
      `
    });

    mesh.material = this.shaderMaterial;
  },

  remove() {
    this.el.removeEventListener(
      'materialtextureloaded',
      this.applyBlurMaterial
    );
    this.el.removeEventListener(
      'object3dset',
      this.applyBlurMaterial
    );

    const mesh = this.el.getObject3D('mesh');
    if (mesh && this.originalMaterial) {
      mesh.material = this.originalMaterial;
    }

    if (this.shaderMaterial) {
      this.shaderMaterial.dispose();
    }
  }
});
</script>

<script>
const infoPanel = document.querySelector('#infoPanel');
const welcomePanel = document.querySelector('#welcomePanel');
const gazeCursor = document.querySelector('#gazeCursor');
const languageOverlay = document.querySelector('#languageOverlay');
const languageBox = document.querySelector('#languageBox');
const tileLayer = document.querySelector('#tileLayer');

// Deep Zoom tile settings.
const TILE_IMAGE_WIDTH = 15354;
const TILE_IMAGE_HEIGHT = 13230;
const TILE_WORLD_WIDTH = 4;
const TILE_WORLD_HEIGHT = 3.45;
const TILE_SIZE = 254;
const TILE_OVERLAP = 1;
const MAX_LEVEL = 14;
const TILE_FOLDER = 'tiles';

const mainCamera = document.querySelector('#mainCamera');
const backButton = document.querySelector('#backButton');

let loadedTileKeys = new Set();
let tileGeneration = 0;
let storyNarrating = false;
let storyAdvancePending = false;
const GAZE_CONFIRM_MS = 2500;
const paintingLow = document.querySelector('#paintingLow');

let guidedTourActive = true;
let guidedTourComplete = false;
let initialWelcomeSpoken = false;
let preferredVoice = null;
let availableVoices = [];
let focusedHotspotId = null;
let focusTransitioning = false;
let focusLeaveTimer = null;

// Progressive attention guidance.
const audioGuide = {
  captain: {
    direct: {
      en: 'Look toward the captain in black near the center.',
      ar: 'انظر نحو القائد الذي يرتدي الأسود قرب مركز اللوحة.'
    },
    narrate: {
      en: 'Captain Frans Banninck Cocq leads the civic guard. His dark clothing, red sash, and outstretched hand establish authority and movement.',
      ar: 'يقود الكابتن فرانس بانينك كوك فرقة الحرس المدني، وتبرز ملابسه الداكنة ووشاحه الأحمر ويده الممدودة سلطته وحركة المشهد.'
    }
  },
  lieutenant: {
    direct: {
      en: 'Now look to the lieutenant in bright yellow beside him.',
      ar: 'والآن انظر إلى الملازم ذي الملابس الصفراء اللامعة بجانبه.'
    },
    narrate: {
      en: 'Lieutenant Willem van Ruytenburch creates a luminous contrast beside the captain and draws the eye across the center.',
      ar: 'يخلق الملازم فيليم فان رويتنبرخ تباينًا مضيئًا بجانب القائد ويوجه النظر عبر مركز اللوحة.'
    }
  },
  girl: {
    direct: {
      en: 'Next, find the illuminated girl to the left.',
      ar: 'بعد ذلك، ابحث عن الفتاة المضيئة إلى اليسار.'
    },
    narrate: {
      en: 'The illuminated girl is a symbolic figure carrying objects linked to the identity and traditions of the civic guard.',
      ar: 'الفتاة المضيئة شخصية رمزية تحمل أشياء مرتبطة بهوية الحرس المدني وتقاليده.'
    }
  },
  drummer: {
    direct: {
      en: 'Now look to the drummer on the far right.',
      ar: 'والآن انظر إلى قارع الطبل في أقصى اليمين.'
    },
    narrate: {
      en: 'The drummer adds imagined sound and rhythm, making the company feel ready to move.',
      ar: 'يضيف قارع الطبل صوتًا وإيقاعًا متخيلين ويجعل الفرقة تبدو مستعدة للتحرك.'
    }
  },
  flag: {
    direct: {
      en: 'Look upward and left for the flag bearer.',
      ar: 'انظر إلى الأعلى واليسار بحثًا عن حامل الراية.'
    },
    narrate: {
      en: 'The flag identifies the company and adds ceremony and strong diagonal movement.',
      ar: 'تُعرّف الراية بالفرقة وتضيف طابعًا احتفاليًا وحركة قطرية قوية.'
    }
  },
  musketeer: {
    direct: {
      en: 'Now find the musketeer on the left.',
      ar: 'والآن ابحث عن حامل البندقية في اليسار.'
    },
    narrate: {
      en: 'The musketeer recalls the guard’s military role while his weapon becomes part of the composition’s theatrical lines.',
      ar: 'يشير حامل البندقية إلى الدور العسكري للحرس، بينما يصبح سلاحه جزءًا من الخطوط المسرحية في التكوين.'
    }
  },
  dog: {
    direct: {
      en: 'Look down near the drummer for the small dog.',
      ar: 'انظر إلى الأسفل قرب قارع الطبل بحثًا عن الكلب الصغير.'
    },
    narrate: {
      en: 'The dog adds spontaneity and everyday life to the crowded scene.',
      ar: 'يضيف الكلب العفوية وإحساس الحياة اليومية إلى المشهد المزدحم.'
    }
  },
  leftGroup: {
    direct: {
      en: 'Now look across the group of guards on the left.',
      ar: 'والآن انظر إلى مجموعة الحراس في اليسار.'
    },
    narrate: {
      en: 'The overlapping figures create depth and turn a formal portrait into a dramatic scene.',
      ar: 'تخلق الشخصيات المتداخلة عمقًا وتحول الصورة الرسمية إلى مشهد درامي.'
    }
  },
  rightGroup: {
    direct: {
      en: 'Shift your attention to the group on the right.',
      ar: 'حوّل انتباهك إلى المجموعة في اليمين.'
    },
    narrate: {
      en: 'The figures on the right balance the central pair and expand the sense of a large gathering.',
      ar: 'توازن الشخصيات في اليمين الثنائي المركزي وتوسع الإحساس بتجمع كبير.'
    }
  },
  backgroundArch: {
    direct: {
      en: 'Finally, look toward the dark architecture in the background.',
      ar: 'وأخيرًا، انظر نحو العمارة الداكنة في الخلفية.'
    },
    narrate: {
      en: 'The architecture frames the action and intensifies Rembrandt’s dramatic use of light and shadow.',
      ar: 'تؤطر العمارة الخلفية الحركة وتكثف استخدام رامبرانت الدرامي للضوء والظل.'
    }
  }
};

const attentionSequence = [
  'captain',
  'lieutenant',
  'girl',
  'drummer',
  'flag',
  'musketeer',
  'dog',
  'leftGroup',
  'rightGroup',
  'backgroundArch'
];

// Attention and focus regions are independent from the invisible gaze planes.
const attentionRegions = {
  captain:        { offsetX: -0.01, offsetY: 0.28, width: 0.15, height: 0.15 },
  lieutenant:     { offsetX: 0.00, offsetY: 0.27, width: 0.15, height: 0.15 },
  girl:           { offsetX: 0.00, offsetY: 0.19, width: 0.14, height: 0.14 },
  drummer:        { offsetX: 0.00, offsetY: 0.19, width: 0.16, height: 0.16 },
  flag:           { offsetX: 0.00, offsetY: 0.28, width: 0.16, height: 0.16 },
  musketeer:      { offsetX: 0.00, offsetY: 0.18, width: 0.14, height: 0.14 },
  dog:            { offsetX: 0.00, offsetY: 0.00, width: 0.14, height: 0.10 },
  leftGroup:      { offsetX: 0.00, offsetY: 0.17, width: 0.18, height: 0.18 },
  rightGroup:     { offsetX: 0.00, offsetY: 0.17, width: 0.18, height: 0.18 },
  backgroundArch: { offsetX: 0.00, offsetY: 0.00, width: 0.18, height: 0.12 }
};

const focusRegions = {
  captain:        { offsetX: 0.00, offsetY: 0.00, width: 0.52, height: 0.86 },
  lieutenant:     { offsetX: 0.00, offsetY: 0.00, width: 0.50, height: 0.90 },
  girl:           { offsetX: 0.00, offsetY: 0.00, width: 0.42, height: 0.68 },
  drummer:        { offsetX: 0.00, offsetY: 0.00, width: 0.64, height: 0.96 },
  flag:           { offsetX: 0.00, offsetY: 0.00, width: 0.70, height: 1.08 },
  musketeer:      { offsetX: 0.00, offsetY: 0.00, width: 0.44, height: 0.74 },
  dog:            { offsetX: 0.00, offsetY: 0.00, width: 0.52, height: 0.30 },
  leftGroup:      { offsetX: 0.00, offsetY: 0.00, width: 0.72, height: 0.94 },
  rightGroup:     { offsetX: 0.00, offsetY: 0.00, width: 0.82, height: 1.00 },
  backgroundArch: { offsetX: 0.00, offsetY: 0.00, width: 0.94, height: 0.66 }
};

let attentionIndex = 0;
let attentionTargetId = null;
let attentionLevelTimer = null;
let attentionAdvanceTimer = null;
let attentionRunning = false;

function levelDimensions(level) {
  const scale = Math.pow(2, level - MAX_LEVEL);
  return {
    width: Math.ceil(TILE_IMAGE_WIDTH * scale),
    height: Math.ceil(TILE_IMAGE_HEIGHT * scale)
  };
}

function addTile(level, col, row, maskSpec = null) {
  const generationAtRequest = tileGeneration;
  const maskKey = maskSpec
    ? `${maskSpec.centerX}_${maskSpec.centerY}_${maskSpec.width}_${maskSpec.height}`
    : 'none';

  const key = `${level}_${col}_${row}_${maskKey}`;
  if (loadedTileKeys.has(key)) return;
  loadedTileKeys.add(key);

  const dims = levelDimensions(level);
  const levelWidth = dims.width;
  const levelHeight = dims.height;

  const coreX = col * TILE_SIZE;
  const coreY = row * TILE_SIZE;

  if (coreX >= levelWidth || coreY >= levelHeight) return;

  const columns = Math.ceil(levelWidth / TILE_SIZE);
  const rows = Math.ceil(levelHeight / TILE_SIZE);

  const leftOverlap = col === 0 ? 0 : TILE_OVERLAP;
  const topOverlap = row === 0 ? 0 : TILE_OVERLAP;
  const rightOverlap = col === columns - 1 ? 0 : TILE_OVERLAP;
  const bottomOverlap = row === rows - 1 ? 0 : TILE_OVERLAP;

  const fileX = Math.max(0, coreX - leftOverlap);
  const fileY = Math.max(0, coreY - topOverlap);

  const fileWidth = Math.min(
    TILE_SIZE + leftOverlap + rightOverlap,
    levelWidth - fileX
  );

  const fileHeight = Math.min(
    TILE_SIZE + topOverlap + bottomOverlap,
    levelHeight - fileY
  );

  const worldWidth = fileWidth / levelWidth * TILE_WORLD_WIDTH;
  const worldHeight = fileHeight / levelHeight * TILE_WORLD_HEIGHT;

  const centerX =
    ((fileX + fileWidth / 2) / levelWidth - 0.5) * TILE_WORLD_WIDTH;

  const centerY =
    (0.5 - (fileY + fileHeight / 2) / levelHeight) * TILE_WORLD_HEIGHT;

  const tile = document.createElement('a-plane');
  tile.setAttribute('data-tile-key', key);
  tile.setAttribute('width', worldWidth);
  tile.setAttribute('height', worldHeight);
  tile.setAttribute('position', `${centerX} ${centerY} 0`);

  if (!maskSpec) {
    tile.setAttribute('src', `${TILE_FOLDER}/${level}/${col}_${row}.jpeg`);
    tile.setAttribute(
      'material',
      'shader: flat; side: double; transparent: true; opacity: 0'
    );
    tile.setAttribute(
      'animation__fade',
      'property: material.opacity; from: 0; to: 1; dur: 450; easing: easeOutQuad'
    );
    tileLayer.appendChild(tile);
    return;
  }

  const image = new Image();
  image.crossOrigin = 'anonymous';

  image.onload = () => {
    if (generationAtRequest !== tileGeneration) return;

    const canvas = document.createElement('canvas');
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);

    const tileLeft = centerX - worldWidth / 2;
    const tileTop = centerY + worldHeight / 2;

    const maskCenterX =
      ((maskSpec.centerX - tileLeft) / worldWidth) * canvas.width;
    const maskCenterY =
      ((tileTop - maskSpec.centerY) / worldHeight) * canvas.height;

    const radiusX =
      (maskSpec.width / 2 / worldWidth) * canvas.width;
    const radiusY =
      (maskSpec.height / 2 / worldHeight) * canvas.height;

    ctx.globalCompositeOperation = 'destination-in';
    ctx.save();
    ctx.translate(maskCenterX, maskCenterY);
    ctx.scale(1, radiusY / Math.max(radiusX, 0.0001));

    const gradient = ctx.createRadialGradient(
      0, 0, radiusX * 0.45,
      0, 0, radiusX
    );
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.70, 'rgba(255,255,255,0.95)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, radiusX, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;

    tile.addEventListener('loaded', () => {
      const mesh = tile.getObject3D('mesh');
      if (!mesh) return;

      mesh.material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        side: THREE.DoubleSide,
        depthWrite: false
      });

      const startTime = performance.now();
      const duration = 1400;

      function fade(now) {
        const t = Math.min(1, (now - startTime) / duration);
        mesh.material.opacity = t;
        mesh.material.needsUpdate = true;
        if (t < 1) requestAnimationFrame(fade);
      }

      requestAnimationFrame(fade);
    });

    tileLayer.appendChild(tile);
  };

  image.src = `${TILE_FOLDER}/${level}/${col}_${row}.jpeg`;
}

function clearHighResolutionTiles() {
  tileGeneration += 1;
  tileLayer.innerHTML = '';

function loadTilesAroundHotspot(
  hotspotId,
  level = MAX_LEVEL,
  padding = 0.06,
  sizeOverride = null,
  useSoftMask = false
) {
  const hotspot = document.querySelector('#' + hotspotId);
  if (!hotspot) return;

  const pos = hotspot.getAttribute('position');
  const hotspotWidth =
    (sizeOverride && sizeOverride.width) ||
    parseFloat(hotspot.getAttribute('width')) ||
    0.4;
  const hotspotHeight =
    (sizeOverride && sizeOverride.height) ||
    parseFloat(hotspot.getAttribute('height')) ||
    0.7;

  // Convert the hotspot's world position to paintingRoot-local coordinates.
  const localCenterX =
    pos.x + ((sizeOverride && sizeOverride.offsetX) || 0);
  const localCenterY =
    pos.y - 1.6 + ((sizeOverride && sizeOverride.offsetY) || 0);

  const leftWorld = localCenterX - hotspotWidth / 2 - padding;
  const rightWorld = localCenterX + hotspotWidth / 2 + padding;
  const topWorld = localCenterY + hotspotHeight / 2 + padding;
  const bottomWorld = localCenterY - hotspotHeight / 2 - padding;

  const dims = levelDimensions(level);

  const leftPx = Math.max(
    0,
    ((leftWorld / TILE_WORLD_WIDTH) + 0.5) * dims.width
  );

  const rightPx = Math.min(
    dims.width,
    ((rightWorld / TILE_WORLD_WIDTH) + 0.5) * dims.width
  );

  const topPx = Math.max(
    0,
    (0.5 - topWorld / TILE_WORLD_HEIGHT) * dims.height
  );

  const bottomPx = Math.min(
    dims.height,
    (0.5 - bottomWorld / TILE_WORLD_HEIGHT) * dims.height
  );

  const startCol = Math.floor(leftPx / TILE_SIZE);
  const endCol = Math.floor(Math.max(0, rightPx - 1) / TILE_SIZE);
  const startRow = Math.floor(topPx / TILE_SIZE);
  const endRow = Math.floor(Math.max(0, bottomPx - 1) / TILE_SIZE);

  const maskSpec = useSoftMask
    ? {
        centerX: localCenterX,
        centerY: localCenterY,
        width: hotspotWidth + padding * 2,
        height: hotspotHeight + padding * 2
      }
    : null;

  for (let row = startRow; row <= endRow; row++) {
    for (let col = startCol; col <= endCol; col++) {
      addTile(level, col, row, maskSpec);
    }
  }
}


function refreshVoices() {
  if (!('speechSynthesis' in window)) return;

  availableVoices = window.speechSynthesis.getVoices();

  const languagePrefix =
    currentLanguage === 'ar' ? 'ar' : 'en';

  const preferredNames =
    currentLanguage === 'ar'
      ? [
          'Microsoft Salma',
          'Microsoft Hamed',
          'Google العربية',
          'Maged',
          'Tarik'
        ]
      : [
          'Microsoft Aria Online',
          'Microsoft Jenny Online',
          'Microsoft Guy Online',
          'Google UK English Female',
          'Google US English',
          'Samantha',
          'Daniel'
        ];

  preferredVoice =
    preferredNames
      .map(name =>
        availableVoices.find(voice =>
          voice.name.toLowerCase().includes(name.toLowerCase())
        )
      )
      .find(Boolean) ||
    availableVoices.find(voice =>
      voice.lang.toLowerCase().startsWith(languagePrefix)
    ) ||
    null;
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.addEventListener(
    'voiceschanged',
    refreshVoices
  );
}

function stopSpeech() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  storyNarrating = false;
}

function speakText(value, onEnd = null) {
  stopSpeech();

  if (!('speechSynthesis' in window) || !value) {
    if (onEnd) setTimeout(onEnd, 250);
    return;
  }

  refreshVoices();

  const utterance = new SpeechSynthesisUtterance(value);
  utterance.lang =
    currentLanguage === 'ar' ? 'ar-SA' : 'en-US';

  if (preferredVoice) {
    utterance.voice = preferredVoice;
  }

  utterance.rate = currentLanguage === 'ar' ? 0.88 : 0.90;
  utterance.pitch = 0.96;
  utterance.volume = 1.0;

  utterance.onend = () => {
    storyNarrating = false;
    if (onEnd) onEnd();
  };

  utterance.onerror = () => {
    storyNarrating = false;
    if (onEnd) onEnd();
  };

  storyNarrating = true;
  window.speechSynthesis.speak(utterance);
}

function speakDirection(id, includeWelcome = false) {
  const entry = audioGuide[id];
  if (!entry) return;

  let textValue = entry.direct[currentLanguage];

  if (includeWelcome) {
    const welcome =
      currentLanguage === 'ar'
        ? 'مرحبًا بك في الحراسة الليلية.'
        : 'Welcome to The Night Watch.';

    textValue = `${welcome} ${textValue}`;
  }

  speakText(textValue);
}

function speakNarration(id, onEnd = null) {
  const entry = audioGuide[id];

  if (!entry) {
    if (onEnd) onEnd();
    return;
  }

  speakText(entry.narrate[currentLanguage], onEnd);
}

function speakTourClosing() {
  const closing =
    currentLanguage === 'ar'
      ? 'انتهت الجولة الموجهة. يمكنك الآن استكشاف أي عنصر بحرية، وسأتحدث فقط عندما تنظر إليه.'
      : 'The guided tour is complete. You may now explore freely, and I will speak only when you gaze at an element.';

  speakText(closing);
}

function animateBaseBlur(targetAmount, duration = 750) {
  const component = paintingLow.components['texture-blur'];
  const startAmount = component
    ? component.data.amount
    : 0;

  const started = performance.now();

  function frame(now) {
    const progress = Math.min(
      1,
      (now - started) / duration
    );

    const eased =
      progress * progress * (3 - 2 * progress);

    const value =
      startAmount +
      (targetAmount - startAmount) * eased;

    paintingLow.setAttribute(
      'texture-blur',
      'amount',
      value
    );

    if (progress < 1) {
      requestAnimationFrame(frame);
    }
  }

  requestAnimationFrame(frame);
}

function clearAttentionTimers() {
  clearTimeout(attentionLevelTimer);
  clearTimeout(attentionAdvanceTimer);
}

function stopProgressiveAttention({ clearTiles = false } = {}) {
  clearAttentionTimers();
  attentionRunning = false;
  attentionTargetId = null;

  if (clearTiles && !focusedHotspotId && !focusTransitioning) {
    clearHighResolutionTiles();
  }
}

function startProgressiveAttention(hotspotId, speakNow = false) {
  console.log('[Attention] cue:', hotspotId);

  if (
    !pageReady ||
    focusedHotspotId ||
    focusTransitioning ||
    !hotspotId
  ) {
    return;
  }

  clearAttentionTimers();
  clearHighResolutionTiles();

  attentionRunning = true;
  attentionTargetId = hotspotId;

  const cueSize = attentionRegions[hotspotId] || null;

  animateBaseBlur(2.2, 850);
  loadTilesAroundHotspot(
    hotspotId,
    14,
    0.0,
    cueSize,
    true
  );

  if (speakNow) {
    speakDirection(
      hotspotId,
      !initialWelcomeSpoken
    );

    initialWelcomeSpoken = true;
  }
}

function advanceProgressiveAttention() {
  if (!guidedTourActive || guidedTourComplete) return;

  attentionIndex += 1;

  if (attentionIndex >= attentionSequence.length) {
    guidedTourActive = false;
    guidedTourComplete = true;
    attentionRunning = false;
    attentionTargetId = null;
    clearHighResolutionTiles();
    animateBaseBlur(0, 600);
    speakTourClosing();
    return;
  }

  startProgressiveAttention(
    attentionSequence[attentionIndex],
    true
  );
}

function resumeProgressiveAttentionAfterFocus(previousId) {
  clearAttentionTimers();
  attentionRunning = false;
  attentionTargetId = null;

  if (!guidedTourActive || guidedTourComplete) {
    animateBaseBlur(0, 500);
    return;
  }

  const currentIndex =
    attentionSequence.indexOf(previousId);

  attentionIndex =
    currentIndex >= 0
      ? currentIndex
      : attentionIndex;

  advanceProgressiveAttention();
}

function getZoomTargetForHotspot(hotspotId) {
  const hotspot = document.querySelector('#' + hotspotId);
  if (!hotspot) return null;

  const pos = hotspot.getAttribute('position');

  // Move the camera toward the selected hotspot while keeping a comfortable distance.
  return {
    x: pos.x,
    y: pos.y,
    z: -1.15
  };
}

function showNestedDetailsFor(hotspotId) {
  hideCaptainDetails();

  if (hotspotId === 'captain') {
    showCaptainDetails();
  }

  // Additional nested-detail groups can be added later using the same pattern.
}

function zoomToHotspot(hotspotId) {
  if (focusedHotspotId || focusTransitioning) return;

  const target = getZoomTargetForHotspot(hotspotId);
  const hotspot = document.querySelector('#' + hotspotId);
  const focusRegion = focusRegions[hotspotId];

  if (!target || !hotspot || !focusRegion) return;

  stopProgressiveAttention({ clearTiles: false });
  focusTransitioning = true;
  focusedHotspotId = hotspotId;
  hidePrimaryHotspots();

  // Expand the already-visible sharp cue without removing it.
  const mediumRegion = {
    offsetX: focusRegion.offsetX,
    offsetY: focusRegion.offsetY,
    width: focusRegion.width * 0.58,
    height: focusRegion.height * 0.58
  };

  loadTilesAroundHotspot(
    hotspotId,
    MAX_LEVEL,
    0,
    mediumRegion,
    true
  );

  setTimeout(() => {
    loadTilesAroundHotspot(
      hotspotId,
      MAX_LEVEL,
      0,
      focusRegion,
      true
    );
  }, 360);

  // Camera begins while the masked detail is still expanding.
  setTimeout(() => {
    animateBaseBlur(0.9, 750);
    mainCamera.setAttribute(
      'animation__focusPosition',
      `property: position; to: ${target.x} ${target.y} ${target.z}; dur: 900; easing: easeInOutQuad`
    );
  }, 620);

  // Description and narration begin during the camera movement.
  setTimeout(() => {
    showInfo(
      hotspotTexts[hotspotId][currentLanguage],
      hotspot
    );

    speakNarration(hotspotId, () => {
      if (!guidedTourActive || guidedTourComplete) {
        return;
      }

      storyAdvancePending = true;

      setTimeout(() => {
        if (
          storyAdvancePending &&
          focusedHotspotId === hotspotId &&
          !focusTransitioning
        ) {
          returnFromFocus(true);
        }
      }, 1800);
    });
  }, 980);

  // Full, unmasked high-resolution tiles settle into the close view.
  setTimeout(() => {
    animateBaseBlur(0, 550);
    loadTilesAroundHotspot(
      hotspotId,
      MAX_LEVEL,
      0.08,
      focusRegion,
      false
    );
  }, 1120);

  setTimeout(() => {
    focusTransitioning = false;
    showNestedDetailsFor(hotspotId);
    backButton.style.display = 'block';
  }, 1550);
}

function switchFocusToHotspot(hotspotId, hotspotEl) {
  // Deliberately disabled in the cinematic flow.
  // The visitor returns with Back before selecting another subject.
}

function returnFromFocus(autoAdvance = false) {
  clearTimeout(focusLeaveTimer);
  storyAdvancePending = false;
  if (!autoAdvance) stopSpeech();
  if (!focusedHotspotId && !focusTransitioning) return;

  focusTransitioning = true;
  hideInfo();
  hideCaptainDetails();
  backButton.style.display = 'none';

  animateBaseBlur(0, 500);

  mainCamera.setAttribute(
    'animation__focusPosition',
    'property: position; to: 0 1.6 0; dur: 800; easing: easeInOutQuad'
  );

  const previousFocusId = focusedHotspotId;

  setTimeout(() => {
    clearHighResolutionTiles();
    focusedHotspotId = null;
    focusTransitioning = false;
    showPrimaryHotspots();
    resumeProgressiveAttentionAfterFocus(previousFocusId);
  }, 820);
}

function makeCanvasTexture(text, language, width = 650, height = 250) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17, 17, 17, 0.68)';
  roundRect(ctx, 0, 0, width, height, 34);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '25px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 52, 38, width - 90, 46);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '24px Arial, sans-serif';
    drawWrappedText(ctx, text, 52, 38, width - 90, 46);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const texture = makeCanvasTexture(text, language);
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = texture;
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 800 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  if (pos.x > 0.8) panelX = pos.x - 0.68;

  let panelY = pos.y + 0.25;
  if (pos.y > 2.0) panelY = pos.y - 0.42;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(infoPanel, text, currentLanguage);
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  activeHotspot = null;
}

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage) return;

    clearTimeout(infoTimer);
    clearTimeout(closeTimer);

    if (el.classList.contains('captainDetail')) {
      infoTimer = setTimeout(() => {
        showInfo(
          hotspotTexts[id][currentLanguage],
          el
        );
        speakNarration(id);
      }, 2000);
      return;
    }

    if (focusedHotspotId || focusTransitioning) return;

    // During the guided tour, only the currently directed target
    // can advance the story. After completion, any hotspot works.
    if (
      guidedTourActive &&
      !guidedTourComplete &&
      attentionTargetId !== id
    ) {
      return;
    }

    infoTimer = setTimeout(() => {
      zoomToHotspot(id);
    }, GAZE_CONFIRM_MS);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(infoTimer);

    if (el.classList.contains('captainDetail')) {
      hideInfo();
    }
  });
}

function startExperience() {
  pageReady = true;
  guidedTourActive = true;
  guidedTourComplete = false;
  initialWelcomeSpoken = false;
  attentionIndex = 0;

  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);
  showPrimaryHotspots();
  hideAllHalos();
  refreshVoices();

  const welcomeText =
    currentLanguage === 'ar'
      ? 'مرحبًا بك. استمع إلى المرشد، ثم انظر إلى العنصر المطلوب لمدة ثانيتين ونصف.'
      : 'Welcome. Listen to the guide, then gaze at the requested element for about two and a half seconds.';

  setPanelText(
    welcomePanel,
    welcomeText,
    currentLanguage
  );
  welcomePanel.setAttribute('visible', true);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);
    startProgressiveAttention(
      attentionSequence[0],
      true
    );
  }, 2200);
}

window.addEventListener('keydown', event => {
  if (event.key === 'Escape' && (focusedHotspotId || focusTransitioning)) {
    returnFromFocus(false);
  }
});


function auditHotspotTexts() {
  const hotspotIds = [...document.querySelectorAll('.hotspot')]
    .map(el => el.id);

  hotspotIds.forEach(id => {
    if (
      !hotspotTexts[id] ||
      !hotspotTexts[id].en ||
      !hotspotTexts[id].ar
    ) {
      console.warn(`Hotspot is missing English or Arabic text: ${id}`);
    }
  });
}

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('load', () => {
  auditHotspotTexts();
  hideInfo();
  hideAllHalos();
  pageReady = false;
  currentLanguage = null;
  tourMode = null;
  gazeCursor.setAttribute('visible', false);

  document.querySelectorAll('.hotspot').forEach(el => {
    el.setAttribute('visible', false);
  });
});
</script>
