<script>
AFRAME.registerComponent('blurred-copy', {
  schema: {
    source: { type: 'string' },
    radius: { type: 'number', default: 4 }
  },

init() {const image = new Image();image.crossOrigin = 'anonymous';

image.onload = () => {
  const scale = 0.32;
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
  canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));

  const ctx = canvas.getContext('2d');
  ctx.filter = `blur(${this.data.radius}px)`;
  ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.needsUpdate = true;

  const apply = () => {
    const mesh = this.el.getObject3D('mesh');
    if (!mesh) return;

    mesh.material = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      depthWrite: false,
      toneMapped: false
    });
  };

  if (this.el.getObject3D('mesh')) {
    apply();
  } else {
    this.el.addEventListener('object3dset', apply, { once: true });
  }
};

image.src = this.data.source;

}});</script>

  leftGroup:      { cueW: 0.64, cueH: 0.78, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.74, focusH: 0.96 },
  rightGroup:     { cueW: 0.72, cueH: 0.82, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.86, focusH: 1.02 },
  backgroundArch: { cueW: 0.72, cueH: 0.38, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.96, focusH: 0.68 }
};

const State = Object.freeze({
  IDLE: 'IDLE',
  CUE: 'CUE',
  WAIT_GAZE: 'WAIT_GAZE',
  ZOOMING: 'ZOOMING',
  STORY: 'STORY',
  RETURNING: 'RETURNING',
  FREE: 'FREE'
});

let currentLanguage = 'en';
let pageReady = false;
let gazeTimer = null;
let speechUtterance = null;
let voices = [];

function levelDimensions(level) {
  const scale = Math.pow(2, level - MAX_LEVEL);
  return {
    width: Math.ceil(IMAGE_WIDTH * scale),
    height: Math.ceil(IMAGE_HEIGHT * scale)
  };
}

function tileGeometry(level, col, row) {
  const dims = levelDimensions(level);
  const coreX = col * TILE_SIZE;
  const coreY = row * TILE_SIZE;

  if (coreX >= dims.width || coreY >= dims.height) return null;

  const columns = Math.ceil(dims.width / TILE_SIZE);
  const rows = Math.ceil(dims.height / TILE_SIZE);

  const leftOverlap = col === 0 ? 0 : TILE_OVERLAP;
  const topOverlap = row === 0 ? 0 : TILE_OVERLAP;
  const rightOverlap = col === columns - 1 ? 0 : TILE_OVERLAP;
  const bottomOverlap = row === rows - 1 ? 0 : TILE_OVERLAP;

  const fileX = Math.max(0, coreX - leftOverlap);
  const fileY = Math.max(0, coreY - topOverlap);
  const fileW = Math.min(
    TILE_SIZE + leftOverlap + rightOverlap,
    dims.width - fileX
  );
  const fileH = Math.min(
    TILE_SIZE + topOverlap + bottomOverlap,
    dims.height - fileY
  );

  return {
    dims,
    fileX,
    fileY,
    fileW,
    fileH,
    worldW: fileW / dims.width * WORLD_WIDTH,
    worldH: fileH / dims.height * WORLD_HEIGHT,
    centerX: ((fileX + fileW / 2) / dims.width - 0.5) * WORLD_WIDTH,
    centerY: (0.5 - (fileY + fileH / 2) / dims.height) * WORLD_HEIGHT
  };
}

function hotspotCenter(id) {
  const hotspot = document.querySelector('#' + id);
  const pos = hotspot.getAttribute('position');
  return { x: pos.x, y: pos.y - 1.6 };
}

function tileRangeFor(id, width, height, offsetX = 0, offsetY = 0) {
  const baseCenter = hotspotCenter(id);
  const center = {
    x: baseCenter.x + offsetX,
    y: baseCenter.y + offsetY
  };
  const dims = levelDimensions(MAX_LEVEL);

  const leftPx = Math.max(
    0,
    ((center.x - width / 2) / WORLD_WIDTH + 0.5) * dims.width
  );
  const rightPx = Math.min(
    dims.width,
    ((center.x + width / 2) / WORLD_WIDTH + 0.5) * dims.width
  );
  const topPx = Math.max(
    0,
    (0.5 - (center.y + height / 2) / WORLD_HEIGHT) * dims.height
  );
  const bottomPx = Math.min(
    dims.height,
    (0.5 - (center.y - height / 2) / WORLD_HEIGHT) * dims.height
  );

  return {
    center,
    startCol: Math.floor(leftPx / TILE_SIZE),
    endCol: Math.floor(Math.max(0, rightPx - 1) / TILE_SIZE),
    startRow: Math.floor(topPx / TILE_SIZE),
    endRow: Math.floor(Math.max(0, bottomPx - 1) / TILE_SIZE)
  };
}

function animateOpacity(object3D, target, duration = 450) {
  if (!object3D) return;

  const materials = [];
  object3D.traverse(node => {
    if (node.material) materials.push(node.material);
  });

  const startValues = materials.map(material => material.opacity || 0);
  const started = performance.now();

  function frame(now) {
    const progress = Math.min(1, (now - started) / duration);
    const eased = progress * progress * (3 - 2 * progress);

    materials.forEach((material, index) => {
      material.transparent = true;
      material.opacity =
        startValues[index] +
        (target - startValues[index]) * eased;
      material.needsUpdate = true;
    });

    if (progress < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function animateTint(object3D, targetHex, duration = 850) {
  return new Promise(resolve => {
    if (!object3D) {
      resolve();
      return;
    }

    const materials = [];
    object3D.traverse(node => {
      if (node.material && node.material.color) {
        materials.push(node.material);
      }
    });

    if (!materials.length) {
      resolve();
      return;
    }

    const target = new THREE.Color(targetHex);
    const starts = materials.map(material => material.color.clone());
    const started = performance.now();

    function frame(now) {
      const progress = Math.min(1, (now - started) / duration);
      const eased =
        progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

      materials.forEach((material, index) => {
        material.color.copy(starts[index]).lerp(target, eased);
        material.needsUpdate = true;
      });

      if (progress < 1) {
        requestAnimationFrame(frame);
      } else {
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

function setBlurOpacity(target, duration = 450) {
  const mesh = paintingBlur.getObject3D('mesh');
  if (!mesh || !mesh.material) return;

  const start = mesh.material.opacity || 0;
  const started = performance.now();

  function frame(now) {
    const progress = Math.min(1, (now - started) / duration);
    const eased = progress * progress * (3 - 2 * progress);

    mesh.material.opacity =
      start + (target - start) * eased;
    mesh.material.needsUpdate = true;

    if (progress < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function setGroupMaterials(groupEl, callback) {
  if (!groupEl || !groupEl.object3D) return;
  groupEl.object3D.traverse(node => {
    const materials = Array.isArray(node.material)
      ? node.material
      : (node.material ? [node.material] : []);
    materials.forEach(callback);
  });
}

function directTileEntity(col, row, geometry, opacity = 0) {
  const tile = document.createElement('a-image');
  tile.setAttribute('src', `${TILE_FOLDER}/${MAX_LEVEL}/${col}_${row}.jpeg`);
  tile.setAttribute('width', geometry.worldW);
  tile.setAttribute('height', geometry.worldH);
  tile.setAttribute('position', `${geometry.centerX} ${geometry.centerY} 0`);
  tile.setAttribute(
    'material',
    `shader: flat; transparent: true; opacity: ${opacity}; ` +
    'alphaTest: 0.001; side: double; depthTest: false; depthWrite: false; toneMapped: false'
  );
  tile.dataset.tile = `${col}_${row}`;
  return tile;
}

const CueCache = {
  entries: new Map(),

  async ensure(id) {
    if (this.entries.has(id)) return this.entries.get(id);

    const cfg = REGION[id];
    const range = tileRangeFor(
      id,
      cfg.cueW,
      cfg.cueH,
      cfg.cueOffsetX || 0,
      cfg.cueOffsetY || 0
    );

    const group = document.createElement('a-entity');
    group.setAttribute('visible', false);
    group.dataset.target = id;

    let count = 0;
    for (let row = range.startRow; row <= range.endRow; row++) {
      for (let col = range.startCol; col <= range.endCol; col++) {
        const geometry = tileGeometry(MAX_LEVEL, col, row);
        if (!geometry) continue;
        group.appendChild(directTileEntity(col, row, geometry, 0));
        count += 1;
      }
    }

    if (!count) throw new Error(`No direct cue tiles found for ${id}`);

    cueLayer.appendChild(group);
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

    // Normal blending and no canvas textures: each JPEG becomes a native GPU texture.
    setGroupMaterials(group, material => {
      material.transparent = true;
      material.opacity = 0;
      material.color.set('#fff3bd');
      material.blending = THREE.NormalBlending;
      material.depthTest = false;
      material.depthWrite = false;
      material.toneMapped = false;
      material.needsUpdate = true;
    });

    const entry = { entity: group };
    this.entries.set(id, entry);
    console.log(`[Cue tiles] ${id}: ${count} native JPEG tiles`);
    return entry;
  },

  hideAll() {
    this.entries.forEach(entry => {
      entry.entity.setAttribute('visible', false);
      setGroupMaterials(entry.entity, material => {
        material.opacity = 0;
        material.needsUpdate = true;
      });
    });
  }
};

function clearFocusTiles() {
  while (focusLayer.firstChild) {
    focusLayer.removeChild(focusLayer.firstChild);
  }
}

async function loadFocusTiles(id) {
  clearFocusTiles();

  const cfg = REGION[id];
  const range = tileRangeFor(id, cfg.focusW, cfg.focusH);
  const group = document.createElement('a-entity');
  group.dataset.target = id;
  focusLayer.appendChild(group);

  let count = 0;
  for (let row = range.startRow; row <= range.endRow; row++) {
    for (let col = range.startCol; col <= range.endCol; col++) {
      const geometry = tileGeometry(MAX_LEVEL, col, row);
      if (!geometry) continue;
      group.appendChild(directTileEntity(col, row, geometry, 0));
      count += 1;
    }
  }

  console.log(`[Focus tiles] ${id}: ${count} native JPEG tiles`);

  // Give A-Frame two render frames to create the meshes and start image loads.
  await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

  setGroupMaterials(group, material => {
    material.transparent = true;
    material.opacity = 0;
    material.color.set('#ffffff');
    material.blending = THREE.NormalBlending;
    material.depthTest = false;
    material.depthWrite = false;
    material.toneMapped = false;
    material.needsUpdate = true;
  });

  animateOpacity(group.object3D, 1, 500);
}

function refreshVoices() {
  if (!('speechSynthesis' in window)) return;
  voices = window.speechSynthesis.getVoices();
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.addEventListener('voiceschanged', refreshVoices);
}

function stopSpeech() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  speechUtterance = null;
}

function speak(text, onEnd = null) {
  if (!('speechSynthesis' in window) || !text) return;

  stopSpeech();
  refreshVoices();

  const prefix = currentLanguage === 'ar' ? 'ar' : 'en';
  const preferred = voices.find(v =>
    v.lang.toLowerCase().startsWith(prefix) &&
    /aria|jenny|samantha|daniel|salma|hamed|google/i.test(v.name)
  ) || voices.find(v => v.lang.toLowerCase().startsWith(prefix));

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = currentLanguage === 'ar' ? 'ar-SA' : 'en-US';
  utterance.rate = currentLanguage === 'ar' ? 0.88 : 0.92;
  utterance.pitch = 0.97;
  if (preferred) utterance.voice = preferred;

  if (typeof onEnd === 'function') {
    let completed = false;
    const finish = () => {
      if (completed) return;
      completed = true;
      onEnd();
    };

    utterance.onend = finish;
    utterance.onerror = finish;
  }

  speechUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

const AUDIO_FILES = {
  intro: 'intro.mp3',
  captain: 'captain.mp3',
  lieutenant: 'lieutenant.mp3',
  girl: 'girl.mp3'
};

const narrator = new Audio();
narrator.preload = 'auto';
let activeNarrationToken = 0;

function stopNarration() {
  activeNarrationToken += 1;
  narrator.pause();
  narrator.removeAttribute('src');
  narrator.load();
  stopSpeech();
}

function estimatedNarrationMs(text) {
  const words = String(text || '').trim().split(/\s+/).filter(Boolean).length;
  return Math.max(4500, words * 430);
}

function playNarration(id, text, onEnd = null, options = {}) {
  const token = ++activeNarrationToken;
  narrator.pause();
  narrator.currentTime = 0;
  stopSpeech();

  const finish = () => {
    if (token !== activeNarrationToken) return;
    if (typeof onEnd === 'function') onEnd();
  };

  const file = AUDIO_FILES[id];
  if (file) {
    narrator.src = file;
    narrator.onended = finish;
    narrator.onerror = () => {
      console.error('Audio file failed to load:', file);
      if (options.isIntro) {
        showAudioStartOverlay();
      } else if ('speechSynthesis' in window) {
        speak(text, finish);
      } else {
        setTimeout(finish, estimatedNarrationMs(text));
      }
    };

    const promise = narrator.play();
    if (promise && typeof promise.catch === 'function') {
      promise.catch(error => {
        console.warn('Audio playback was blocked:', error);
        if (options.isIntro) {
          showAudioStartOverlay();
        } else if ('speechSynthesis' in window) {
          speak(text, finish);
        } else {
          setTimeout(finish, estimatedNarrationMs(text));
        }
      });
    }
    return;
  }

  // Temporary fallback while the remaining MP3 files are being added.
  if ('speechSynthesis' in window) {
    speak(text, finish);
  } else {
    setTimeout(finish, estimatedNarrationMs(text));
  }
}

function standardNarration(id) {
  const raw = hotspotTexts[id][currentLanguage];
  return raw.replace(/\n+/g, ' ');
}

function makeCanvasTexture(text, language, width = 520, height = 190) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17,17,17,0.72)';
  roundRect(ctx, 0, 0, width, height, 26);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '22px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 38, 26, width - 68, 36);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '21px Arial, sans-serif';
    drawWrappedText(ctx, text, 38, 26, width - 68, 36);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';

      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = makeCanvasTexture(text, language);
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(id) { /* descriptions removed */ }

function hideInfo() { }

function showPrimaryHotspots(show) {
  document.querySelectorAll('.hotspot').forEach(el => {
    if (el.classList.contains('captainDetail')) {
      el.setAttribute('visible', false);
    } else {
      el.setAttribute('visible', show);
    }
  });
}

function showNestedDetails(id) {
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', id === 'captain');
  });
}

const TourEngine = {
  state: State.IDLE,
  index: 0,
  target: null,
  pulseToken: 0,
  autoTimer: null,

  setState(next) {
    this.state = next;
    console.log('[Tour state]', next);
  },

  async startCue(id) {
    clearTimeout(this.autoTimer);
    this.pulseToken += 1;
    const token = this.pulseToken;

    this.target = id;
    this.setState(State.CUE);
    CueCache.hideAll();
    setBlurOpacity(0, 150);

    const entry = await CueCache.ensure(id);
    if (token !== this.pulseToken) return;

    entry.entity.setAttribute('visible', true);

    setGroupMaterials(entry.entity, material => {
      material.color.set('#fff3bd');
      material.opacity = 0.08;
      material.blending = THREE.NormalBlending;
      material.depthTest = false;
      material.depthWrite = false;
      material.needsUpdate = true;
    });

    const nextId = STORY_ORDER[this.index + 1];
    if (nextId) {
      CueCache.ensure(nextId).catch(console.warn);
    }

    // Four gentle halo pulses, then leave only a very subtle glow.
    for (let cycle = 0; cycle < 4; cycle++) {
      if (
        token !== this.pulseToken ||
        this.state === State.ZOOMING ||
        this.target !== id
      ) return;

      animateOpacity(entry.entity.object3D, 0.42, 650);
      await this.wait(760);

      if (
        token !== this.pulseToken ||
        this.state === State.ZOOMING ||
        this.target !== id
      ) return;

      animateOpacity(entry.entity.object3D, 0.08, 650);
      await this.wait(760);
    }

    if (token !== this.pulseToken || this.target !== id) return;

    animateOpacity(entry.entity.object3D, 0.10, 300);
    this.setState(State.WAIT_GAZE);
  },

  confirmGaze(id) {
    if (this.state === State.FREE) {
      this.openTarget(id, false);
      return;
    }

    if (
      (this.state === State.CUE || this.state === State.WAIT_GAZE) &&
      id === this.target
    ) {
      this.openTarget(id, true);
    }
  },

  async openTarget(id, orderedStory) {
    this.pulseToken += 1;
    this.setState(State.ZOOMING);
    clearTimeout(this.autoTimer);
    setBlurOpacity(0, 250);
    CueCache.hideAll();
    showPrimaryHotspots(false);
    await loadFocusTiles(id);

    const hotspot = document.querySelector('#' + id);
    const pos = hotspot.getAttribute('position');

    setTimeout(() => {
      // In immersive VR the headset controls the camera pose directly, so
      // animate the parent rig instead of the camera itself.
      const rigY = pos.y - 1.6;
      cameraRig.setAttribute(
        'animation__focus',
        `property: position; to: ${pos.x} ${rigY} -1.15; dur: 850; easing: easeInOutQuad`
      );
    }, 220);

    setTimeout(() => {
      this.setState(State.STORY);
      
      showNestedDetails(id);
      backButton.style.display = 'block';

      const narration = orderedStory
        ? STORY_TEXT[id][currentLanguage]
        : standardNarration(id);

      if (orderedStory) {
        playNarration(id, narration, () => {
          this.autoTimer = setTimeout(() => {
            if (this.state === State.STORY && this.target === id) {
              this.returnFromTarget(true);
            }
          }, 900);
        });
      } else {
        playNarration(id, narration);
      }
    }, 850);
  },

  returnFromTarget(advanceStory) {
    if (
      this.state !== State.STORY &&
      this.state !== State.ZOOMING
    ) return;

    clearTimeout(this.autoTimer);
    stopNarration();
    this.setState(State.RETURNING);
    
    showNestedDetails(null);
    backButton.style.display = 'none';

    cameraRig.setAttribute(
      'animation__focus',
      'property: position; to: 0 0 0; dur: 800; easing: easeInOutQuad'
    );

    setTimeout(() => {
      clearFocusTiles();
      showPrimaryHotspots(true);

      if (advanceStory) {
        this.index += 1;

        if (this.index >= STORY_ORDER.length) {
          this.target = null;
          this.setState(State.FREE);
          CueCache.hideAll();
          setBlurOpacity(0, 250);

          const ending =
            currentLanguage === 'ar'
              ? 'انتهت القصة الموجهة. يمكنك الآن استكشاف أي عنصر بحرية.'
              : 'The guided story is complete. You can now explore any element freely.';

          playNarration('ending', ending);

          setTimeout(() => {
            
          }, 4500);
        } else {
          this.startCue(STORY_ORDER[this.index]);
        }
      } else {
        this.setState(State.FREE);
        this.target = null;
      }
    }, 830);
  },

  manualBack() {
    this.returnFromTarget(false);
  },

  wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
};

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage) return;

    clearTimeout(gazeTimer);

    gazeTimer = setTimeout(() => {
      if (el.classList.contains('captainDetail')) {
        
        playNarration(id, standardNarration(id));
        return;
      }

      TourEngine.confirmGaze(id);
    }, el.classList.contains('captainDetail') ? 2000 : GAZE_MS);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(gazeTimer);

    if (el.classList.contains('captainDetail')) {
      
    }
  });
}

function showAudioStartOverlay() {
  languageOverlay.style.display = 'flex';
}

function hideAudioStartOverlay() {
  languageOverlay.style.display = 'none';
}

let experienceStarted = false;
let introStarted = false;

function startIntro() {
  if (introStarted) return;
  introStarted = true;
  hideAudioStartOverlay();

  const introText = 'Welcome to The Night Watch.';
  playNarration('intro', introText, () => {
    // Let the visitor absorb the full painting before the first cue begins.
    setTimeout(() => {
      TourEngine.index = 0;
      TourEngine.startCue(STORY_ORDER[0]);

      setTimeout(() => {
        CueCache.ensure(STORY_ORDER[1]).catch(console.warn);
      }, 900);
    }, 2000);
  }, { isIntro: true });
}

function beginExperience() {
  if (experienceStarted) return;
  experienceStarted = true;
  pageReady = true;
  currentLanguage = 'en';
  gazeCursor.setAttribute('visible', true);
  showPrimaryHotspots(true);
  refreshVoices();

  // Keep the painting still for two seconds before playing the introduction.
  setTimeout(startIntro, 2000);
}

const startExperienceButton = document.querySelector('#startExperienceButton');
startExperienceButton.addEventListener('click', () => {
  if (!experienceStarted) {
    experienceStarted = true;
    pageReady = true;
    currentLanguage = 'en';
    gazeCursor.setAttribute('visible', true);
    showPrimaryHotspots(true);
    refreshVoices();
  }
  introStarted = false;
  startIntro();
});

// Start automatically once the A-Frame scene is ready. If the browser blocks
// autoplay, a single Begin button appears to unlock audio.
const scene = document.querySelector('a-scene');
if (scene.hasLoaded) {
  beginExperience();
} else {
  scene.addEventListener('loaded', beginExperience, { once: true });
}

scene.addEventListener('enter-vr', () => {
  // Force all native tile materials/textures to be reconsidered by the XR renderer.
  [cueLayer, focusLayer].forEach(layer => {
    layer.object3D.traverse(node => {
      if (node.material) {
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        materials.forEach(material => {
          if (material.map) material.map.needsUpdate = true;
          material.needsUpdate = true;
        });
      }
    });
  });
  pageReady = true;
  currentLanguage = 'en';
  gazeCursor.setAttribute('visible', true);
  showPrimaryHotspots(true);

  // Keep the current tour state when entering VR. Only start the intro if
  // the experience has not begun yet.
  if (!experienceStarted) {
    beginExperience();
  }
});


function syncPrimaryHotspotsToFocusRegions() {
  Object.entries(REGION).forEach(([id, config]) => {
    const hotspot = document.querySelector('#' + id);
    if (!hotspot) return;

    hotspot.setAttribute('width', config.focusW);
    hotspot.setAttribute('height', config.focusH);
  });
}

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('keydown', event => {
  if (event.key === 'Escape') {
    TourEngine.manualBack();
  }
});

window.addEventListener('load', () => {
  syncPrimaryHotspotsToFocusRegions();
  infoPanel.setAttribute('visible', false);
  setBlurOpacity(0, 0);

  // Do not reset pageReady, cursor visibility, or hotspot visibility here.
  // On Quest, A-Frame may finish loading before the window load event;
  // resetting these values afterward disables gaze and cue effects in VR.
});
</script>
