<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch Interactive</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, Tahoma, sans-serif;
}

#languageOverlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
}

#languageBox {
  width: min(520px, 90vw);
  background: rgba(20,20,20,0.94);
  color: white;
  border-radius: 18px;
  padding: 28px 24px;
  text-align: center;
}

#languageBox h1 {
  margin: 0 0 12px;
  color: #ffe680;
  font-size: 30px;
}

#languageBox p {
  color: #ddd;
  font-size: 17px;
}

.languageButton,
.tourButton {
  cursor: pointer;
  border: none;
  border-radius: 12px;
  padding: 13px 22px;
  margin: 8px;
  font-size: 18px;
  background: #333;
  color: white;
}

.languageButton:hover,
.tourButton:hover {
  background: #555;
}

.tourOption {
  background: #2b2b2b;
  border: 1px solid #444;
  border-radius: 14px;
  padding: 16px;
  margin: 14px 0;
  cursor: pointer;
}

.tourOption:hover {
  background: #444;
  border-color: #ffe680;
}

.tourOption h2 {
  margin: 0 0 8px;
  color: #ffe680;
  font-size: 21px;
}

.tourOption p {
  margin: 0;
  font-size: 15px;
  color: #ddd;
}
</style>
</head>

<body>

<div id="languageOverlay">
  <div id="languageBox">
    <h1>The Night Watch</h1>
    <p>Choose language / اختر اللغة</p>
    <button class="languageButton" onclick="selectLanguage('en')">English</button>
    <button class="languageButton" onclick="selectLanguage('ar')">العربية</button>
  </div>
</div>

<a-scene>

  <!-- Painting -->
  <a-image
    src="painting.jpg"
    position="0 1.6 -3"
    width="4"
    height="3.45">
  </a-image>

  <!-- YELLOW DEBUG HOTSPOT BOXES: visible all the time for positioning -->
  <a-plane class="hotspot" id="captain" position="-0.05 1.35 -2.95" width="0.35" height="0.75" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="lieutenant" position="0.45 1.30 -2.95" width="0.35" height="0.80" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="girl" position="-0.80 1.18 -2.95" width="0.32" height="0.60" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="drummer" position="1.75 1.25 -2.95" width="0.38" height="0.80" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="flag" position="-1.08 1.95 -2.95" width="0.95" height="0.65" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="musketeer" position="-1.10 1.45 -2.95" width="0.35" height="0.65" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="dog" position="0.95 0.75 -2.95" width="0.35" height="0.25" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="leftGroup" position="-1.55 1.55 -2.95" width="0.42" height="0.75" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="rightGroup" position="1.35 1.60 -2.95" width="0.50" height="0.80" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="backgroundArch" position="0.45 2.25 -2.95" width="0.80" height="0.55" material="color:yellow; opacity:0.25; transparent:true"></a-plane>

  <!-- Extra Curator's Tour boxes -->
  <a-plane class="hotspot" id="captainHand" position="-0.23 1.45 -2.95" width="0.28" height="0.20" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="redSash" position="-0.10 1.25 -2.95" width="0.22" height="0.30" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="chickenClaws" position="-0.72 1.02 -2.95" width="0.24" height="0.24" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="drinkingHorn" position="-0.58 1.16 -2.95" width="0.24" height="0.24" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="weapons" position="-1.00 1.35 -2.95" width="0.36" height="0.45" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="spears" position="0.90 2.05 -2.95" width="0.90" height="0.45" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="light" position="-0.25 1.20 -2.95" width="0.80" height="0.75" material="color:yellow; opacity:0.25; transparent:true"></a-plane>
  <a-plane class="hotspot" id="shield" position="0.58 1.90 -2.95" width="0.30" height="0.25" material="color:yellow; opacity:0.25; transparent:true"></a-plane>

  <!-- Text panels -->
  <a-plane id="infoPanel" visible="false" position="0 0 -2.8" width="1.35" height="0.5" material="transparent:true; opacity:1"></a-plane>
  <a-plane id="welcomePanel" visible="false" position="0 0.55 -2.8" width="1.9" height="0.48" material="transparent:true; opacity:1"></a-plane>

  <!-- Camera and gaze cursor -->
  <a-camera position="0 1.6 0">
    <a-cursor
      id="gazeCursor"
      visible="false"
      fuse="true"
      fuse-timeout="2000"
      raycaster="objects: .hotspot"
      color="black">
    </a-cursor>
  </a-camera>

</a-scene>

<script>
const infoPanel = document.querySelector('#infoPanel');
const welcomePanel = document.querySelector('#welcomePanel');
const gazeCursor = document.querySelector('#gazeCursor');
const languageOverlay = document.querySelector('#languageOverlay');
const languageBox = document.querySelector('#languageBox');

let pageReady = false;
let currentLanguage = null;
let tourMode = null;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;

/* Gallery Tour: main regions only */
const galleryHotspots = [
  'captain', 'lieutenant', 'girl', 'drummer', 'flag',
  'musketeer', 'dog', 'leftGroup', 'rightGroup', 'backgroundArch'
];

/* Curator's Tour: all regions */
const curatorHotspots = [
  ...galleryHotspots,
  'captainHand', 'redSash', 'chickenClaws', 'drinkingHorn',
  'weapons', 'spears', 'light', 'shield'
];

/* Annotation text */
const hotspotTexts = {
  captain: {
    en: 'Captain Frans Banninck Cocq\n\nLeader of the Amsterdam civic guard company. Rembrandt places him at the center, stepping forward in black with a red sash.',
    ar: 'الكابتن فرانس بانينك كوك\n\nقائد فرقة الحرس المدني في أمستردام. يضعه رامبرانت في مركز اللوحة مرتديًا الأسود مع وشاح أحمر.'
  },
  lieutenant: {
    en: 'Lieutenant Willem van Ruytenburch\n\nThe lieutenant stands beside the captain in bright yellow clothing, helping draw the viewer’s eye to the center.',
    ar: 'الملازم فيليم فان رويتنبرخ\n\nيقف بجانب القائد بملابس صفراء لامعة، مما يجذب نظر المشاهد نحو مركز اللوحة.'
  },
  girl: {
    en: 'The Illuminated Girl\n\nShe is not a regular militia member. She works as a symbolic figure, carrying objects connected to the identity of the civic guard.',
    ar: 'الفتاة المضيئة\n\nليست عضوة عادية في الحرس، بل تظهر كشخصية رمزية تحمل أشياء مرتبطة بهوية الفرقة.'
  },
  drummer: {
    en: 'The Drummer\n\nThe drummer adds rhythm, sound, and movement, making the scene feel like a company about to march.',
    ar: 'قارِع الطبل\n\nيضيف الإيقاع والصوت والحركة، فيجعل المشهد يبدو كفرقة تستعد للسير.'
  },
  flag: {
    en: 'The Flag Bearer\n\nThe flag identifies the militia company and adds height, movement, and ceremony to the scene.',
    ar: 'حامل الراية\n\nتُعرّف الراية بفرقة الحرس وتضيف ارتفاعًا وحركة وطابعًا احتفاليًا إلى المشهد.'
  },
  musketeer: {
    en: 'The Musketeer\n\nThe armed guards refer to the civic militia’s role and training. Rembrandt shows the company as active rather than formally posed.',
    ar: 'حامل البندقية\n\nيشير الحراس المسلحون إلى دور وتدريب الميليشيا المدنية. يصورهم رامبرانت في حركة لا في وقفة رسمية.'
  },
  dog: {
    en: 'The Dog\n\nA small lively detail near the drummer. It adds spontaneity and a sense of everyday life to the crowded scene.',
    ar: 'الكلب\n\nتفصيل صغير وحيوي قرب قارع الطبل، يضيف عفوية وإحساسًا بالحياة اليومية داخل المشهد المزدحم.'
  },
  leftGroup: {
    en: 'Left Group of Guards\n\nThese overlapping figures create depth and help turn the group portrait into a busy, moving scene.',
    ar: 'مجموعة الحراس اليسرى\n\nتخلق هذه الشخصيات المتداخلة عمقًا بصريًا وتحول الصورة الجماعية إلى مشهد حي ومتحرك.'
  },
  rightGroup: {
    en: 'Right Group of Guards\n\nThe figures on the right balance the central pair and expand the sense of a large company gathering.',
    ar: 'مجموعة الحراس اليمنى\n\nتوازن الشخصيات في اليمين الثنائي المركزي وتوسع الإحساس بتجمع فرقة كبيرة.'
  },
  backgroundArch: {
    en: 'Background Architecture\n\nThe dark architectural space frames the action and strengthens Rembrandt’s dramatic use of light and shadow.',
    ar: 'الخلفية المعمارية\n\nتؤطر المساحة المعمارية الداكنة المشهد وتعزز استخدام رامبرانت الدرامي للضوء والظل.'
  },
  captainHand: {
    en: 'The Captain’s Hand\n\nA famous detail: the captain’s hand casts a shadow on the lieutenant’s yellow coat, visually linking the two leaders.',
    ar: 'يد القائد\n\nتفصيل شهير: تلقي يد القائد ظلًا على معطف الملازم الأصفر، فتربط بصريًا بين القائدين.'
  },
  redSash: {
    en: 'The Red Sash\n\nThe captain’s red sash helps identify his rank and makes him stand out against the darker clothing.',
    ar: 'الوشاح الأحمر\n\nيساعد وشاح القائد الأحمر على إبراز مكانته ويميزه وسط الملابس الداكنة.'
  },
  chickenClaws: {
    en: 'Chicken Claws\n\nThe claws carried by the girl are connected to the emblem of the arquebusiers, helping identify the militia company.',
    ar: 'مخالب الدجاجة\n\nترتبط المخالب التي تحملها الفتاة بشعار حملة البنادق، وتساعد في تحديد هوية الفرقة.'
  },
  drinkingHorn: {
    en: 'Drinking Horn\n\nThe girl also carries a ceremonial object linked to militia tradition and group identity.',
    ar: 'قرن الشرب\n\nتحمل الفتاة أيضًا غرضًا احتفاليًا مرتبطًا بتقاليد الميليشيا وهوية الجماعة.'
  },
  weapons: {
    en: 'Weapons and Training\n\nThe weapons suggest the civic guard’s military role, but Rembrandt turns them into part of a theatrical composition.',
    ar: 'الأسلحة والتدريب\n\nتشير الأسلحة إلى الدور العسكري للحرس المدني، لكن رامبرانت يجعلها جزءًا من تكوين مسرحي.'
  },
  spears: {
    en: 'Spears and Lines\n\nThe long spears and poles create diagonal lines that guide the viewer’s eye through the painting.',
    ar: 'الرماح والخطوط\n\nتخلق الرماح والعصي الطويلة خطوطًا قطرية تقود عين المشاهد عبر اللوحة.'
  },
  light: {
    en: 'Light and Shadow\n\nRembrandt uses strong contrasts of light and darkness to guide attention and create drama.',
    ar: 'الضوء والظل\n\nيستخدم رامبرانت تباينًا قويًا بين الضوء والظلام لتوجيه الانتباه وخلق الدراما.'
  },
  shield: {
    en: 'Shield with Names\n\nA shield in the background records the names of members of the company, connecting the painting to its patrons.',
    ar: 'درع الأسماء\n\nيسجل الدرع في الخلفية أسماء أعضاء الفرقة، ويربط اللوحة بمن كلفوا برسمها.'
  }
};

/* Step 1: choose language first */
function selectLanguage(language) {
  currentLanguage = language;

  if (language === 'ar') {
    languageBox.innerHTML = `
      <h1>الحراسة الليلية</h1>
      <p>اختر نوع الجولة</p>

      <div class="tourOption" onclick="selectTour('gallery')" style="text-align:right">
        <h2>جولة المعرض</h2>
        <p>تعرف على الشخصيات والعناصر الرئيسية في اللوحة.</p>
      </div>

      <div class="tourOption" onclick="selectTour('curator')" style="text-align:right">
        <h2>جولة القيّم الفني</h2>
        <p>اكتشف الرموز والتفاصيل الخفية والقصص وراء اللوحة.</p>
      </div>
    `;
  } else {
    languageBox.innerHTML = `
      <h1>The Night Watch</h1>
      <p>Choose your tour</p>

      <div class="tourOption" onclick="selectTour('gallery')">
        <h2>Gallery Tour</h2>
        <p>Explore the main figures and key elements of the painting.</p>
      </div>

      <div class="tourOption" onclick="selectTour('curator')">
        <h2>Curator's Tour</h2>
        <p>Discover hidden symbols, details, and stories behind the painting.</p>
      </div>
    `;
  }
}

/* Step 2: choose tour mode */
function selectTour(mode) {
  tourMode = mode;
  startExperience();
}

/* Create canvas texture for English/Arabic text */
function makeCanvasTexture(text, language, width = 650, height = 250) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17, 17, 17, 0.68)';
  roundRect(ctx, 0, 0, width, height, 34);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '25px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 52, 38, width - 90, 46);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '24px Arial, sans-serif';
    drawWrappedText(ctx, text, 52, 38, width - 90, 46);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const texture = makeCanvasTexture(text, language);
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = texture;
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

/* Show annotation near selected hotspot */
function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 800 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  if (pos.x > 0.8) panelX = pos.x - 0.68;

  let panelY = pos.y + 0.25;
  if (pos.y > 2.0) panelY = pos.y - 0.42;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(infoPanel, text, currentLanguage);
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  activeHotspot = null;
}

function hideInfoDelayed(hotspot) {
  clearTimeout(closeTimer);
  closeTimer = setTimeout(() => {
    if (activeHotspot === hotspot) hideInfo();
  }, 1000);
}

/* Add gaze/click behavior to hotspot */
function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('click', () => {
    if (!pageReady || !currentLanguage || !tourMode) return;

    const allowedHotspots =
      tourMode === 'gallery' ? galleryHotspots : curatorHotspots;

    if (!allowedHotspots.includes(id)) return;

    showInfo(hotspotTexts[id][currentLanguage], el);
  });

  el.addEventListener('mouseleave', () => {
    hideInfoDelayed(el);
  });
}

/* Start actual WebXR experience */
function startExperience() {
  pageReady = true;
  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);

  const welcomeText =
    currentLanguage === 'ar'
      ? tourMode === 'gallery'
        ? 'بدأت جولة المعرض. انظر إلى العناصر الرئيسية في اللوحة.'
        : 'بدأت جولة القيّم الفني. ابحث عن الرموز والتفاصيل الخفية.'
      : tourMode === 'gallery'
        ? 'Gallery Tour started. Look at the main elements of the painting.'
        : "Curator's Tour started. Look for hidden symbols and details.";

  setPanelText(welcomePanel, welcomeText, currentLanguage);
  welcomePanel.setAttribute('visible', true);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);
  }, 3500);
}

/* Register all hotspots */
Object.keys(hotspotTexts).forEach(addHotspot);

/* Initial state */
window.addEventListener('load', () => {
  hideInfo();
  pageReady = false;
  currentLanguage = null;
  tourMode = null;
  gazeCursor.setAttribute('visible', false);
});
</script>

</body>
</html>
