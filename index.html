<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch — High-Resolution Hotspot Zoom</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, Tahoma, sans-serif;
}

#languageOverlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
}

#languageBox {
  width: min(520px, 90vw);
  background: rgba(20,20,20,0.94);
  color: white;
  border-radius: 18px;
  padding: 28px 24px;
  text-align: center;
}

#languageBox h1 {
  margin: 0 0 12px;
  color: #ffe680;
  font-size: 30px;
}

#languageBox p {
  color: #ddd;
  font-size: 17px;
}

.languageButton {
  cursor: pointer;
  border: none;
  border-radius: 12px;
  padding: 13px 22px;
  margin: 8px;
  font-size: 18px;
  background: #333;
  color: white;
}

.languageButton:hover {
  background: #555;
}

.tourOption {
  background: #2b2b2b;
  border: 1px solid #444;
  border-radius: 14px;
  padding: 15px;
  margin: 12px 0;
  cursor: pointer;
}

.tourOption:hover {
  background: #444;
  border-color: #ffe680;
}

.tourOption h2 {
  margin: 0 0 7px;
  color: #ffe680;
  font-size: 20px;
}

.tourOption p {
  margin: 0;
  font-size: 15px;
  color: #ddd;
}


#tileControls {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9998;
  display: flex;
  gap: 8px;
}

.tileButton {
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  background: rgba(20,20,20,0.82);
  color: white;
  cursor: pointer;
  font-size: 14px;
}

.tileButton:hover {
  background: rgba(60,60,60,0.92);
}

</style>
</head>

<body>
<div id="tileControls">
  <button
    id="backButton"
    class="tileButton"
    onclick="returnFromFocus()"
    style="display:none">
    ← Back
  </button>
</div>


<div id="languageOverlay">
  <div id="languageBox">
    <h1>The Night Watch</h1>
    <p>Choose language / اختر اللغة</p>
    <button class="languageButton" onclick="selectLanguage('en')">English</button>
    <button class="languageButton" onclick="selectLanguage('ar')">العربية</button>

  <a-plane class="hotspot gallery" id="captain" position="-0.03 1.28 -2.95" width="0.35" height="0.75" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot gallery" id="flag" position="-0.68 1.82 -2.95" width="0.58" height="0.95" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="musketeer" position="-1.10 1.45 -2.95" width="0.35" height="0.65" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot gallery" id="leftGroup" position="-1.45 1.63 -2.95" width="0.55" height="0.80" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot gallery" id="backgroundArch" position="0.45 2.25 -2.95" width="0.80" height="0.55" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot curatorOnly" id="chickenClaws" position="-0.72 1.02 -2.95" width="0.24" height="0.24" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="drinkingHorn" position="-0.58 1.16 -2.95" width="0.24" height="0.24" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="weapons" position="-1.00 1.35 -2.95" width="0.36" height="0.45" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="spears" position="0.90 2.05 -2.95" width="0.90" height="0.45" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="light" position="-0.25 1.20 -2.95" width="0.80" height="0.75" material="opacity:0; transparent:true"></a-plane>

  <!-- Camera and gaze cursor -->
  <a-camera id="mainCamera" position="0 1.6 0">
    <a-cursor
      id="gazeCursor"
      visible="false"
      fuse="true"
      fuse-timeout="2000"
      raycaster="objects: .hotspot, .navButton"
      color="black">
    </a-cursor>
  </a-camera>

<script>
const infoPanel = document.querySelector('#infoPanel');
const welcomePanel = document.querySelector('#welcomePanel');
const gazeCursor = document.querySelector('#gazeCursor');
const languageOverlay = document.querySelector('#languageOverlay');
const languageBox = document.querySelector('#languageBox');
const tileLayer = document.querySelector('#tileLayer');

// Deep Zoom tile settings.
const TILE_IMAGE_WIDTH = 15354;
const TILE_IMAGE_HEIGHT = 13230;
const TILE_WORLD_WIDTH = 4;
const TILE_WORLD_HEIGHT = 3.45;
const TILE_SIZE = 254;
const TILE_OVERLAP = 1;
const MAX_LEVEL = 14;
const TILE_FOLDER = 'tiles';

const mainCamera = document.querySelector('#mainCamera');
const backButton = document.querySelector('#backButton');

let loadedTileKeys = new Set();
let focusedHotspotId = null;
let focusTransitioning = false;
let focusLeaveTimer = null;

function levelDimensions(level) {
  const scale = Math.pow(2, level - MAX_LEVEL);
  return {
    width: Math.ceil(TILE_IMAGE_WIDTH * scale),
    height: Math.ceil(TILE_IMAGE_HEIGHT * scale)
  };
}

function addTile(level, col, row) {
  const key = `${level}_${col}_${row}`;
  if (loadedTileKeys.has(key)) return;
  loadedTileKeys.add(key);

  const dims = levelDimensions(level);
  const levelWidth = dims.width;
  const levelHeight = dims.height;

  const coreX = col * TILE_SIZE;
  const coreY = row * TILE_SIZE;

  if (coreX >= levelWidth || coreY >= levelHeight) return;

  const columns = Math.ceil(levelWidth / TILE_SIZE);
  const rows = Math.ceil(levelHeight / TILE_SIZE);

  const leftOverlap = col === 0 ? 0 : TILE_OVERLAP;
  const topOverlap = row === 0 ? 0 : TILE_OVERLAP;
  const rightOverlap = col === columns - 1 ? 0 : TILE_OVERLAP;
  const bottomOverlap = row === rows - 1 ? 0 : TILE_OVERLAP;

  const fileX = Math.max(0, coreX - leftOverlap);
  const fileY = Math.max(0, coreY - topOverlap);

  const fileWidth = Math.min(
    TILE_SIZE + leftOverlap + rightOverlap,
    levelWidth - fileX
  );

  const fileHeight = Math.min(
    TILE_SIZE + topOverlap + bottomOverlap,
    levelHeight - fileY
  );

  const worldWidth = fileWidth / levelWidth * TILE_WORLD_WIDTH;
  const worldHeight = fileHeight / levelHeight * TILE_WORLD_HEIGHT;

  const centerX =
    ((fileX + fileWidth / 2) / levelWidth - 0.5) * TILE_WORLD_WIDTH;

  const centerY =
    (0.5 - (fileY + fileHeight / 2) / levelHeight) * TILE_WORLD_HEIGHT;

  const tile = document.createElement('a-plane');

  tile.setAttribute('data-tile-key', key);
  tile.setAttribute('src', `${TILE_FOLDER}/${level}/${col}_${row}.jpeg`);
  tile.setAttribute('width', worldWidth);
  tile.setAttribute('height', worldHeight);
  tile.setAttribute('position', `${centerX} ${centerY} 0`);
  tile.setAttribute(
    'material',
    'shader: flat; side: double; transparent: true; opacity: 0'
  );
  tile.setAttribute(
    'animation__fade',
    'property: material.opacity; from: 0; to: 1; dur: 450; easing: easeOutQuad'
  );

  tileLayer.appendChild(tile);
}

function clearHighResolutionTiles() {
  tileLayer.innerHTML = '';
  loadedTileKeys.clear();
}

function loadTilesAroundHotspot(hotspotId, level = MAX_LEVEL, padding = 0.22) {
  const hotspot = document.querySelector('#' + hotspotId);
  if (!hotspot) return;

  const pos = hotspot.getAttribute('position');
  const hotspotWidth = parseFloat(hotspot.getAttribute('width')) || 0.4;
  const hotspotHeight = parseFloat(hotspot.getAttribute('height')) || 0.7;

  // Convert the hotspot's world position to paintingRoot-local coordinates.
  const localCenterX = pos.x;
  const localCenterY = pos.y - 1.6;

  const leftWorld = localCenterX - hotspotWidth / 2 - padding;
  const rightWorld = localCenterX + hotspotWidth / 2 + padding;
  const topWorld = localCenterY + hotspotHeight / 2 + padding;
  const bottomWorld = localCenterY - hotspotHeight / 2 - padding;

  const dims = levelDimensions(level);

  const leftPx = Math.max(
    0,
    ((leftWorld / TILE_WORLD_WIDTH) + 0.5) * dims.width
  );

  const rightPx = Math.min(
    dims.width,
    ((rightWorld / TILE_WORLD_WIDTH) + 0.5) * dims.width
  );

  const topPx = Math.max(
    0,
    (0.5 - topWorld / TILE_WORLD_HEIGHT) * dims.height
  );

  const bottomPx = Math.min(
    dims.height,
    (0.5 - bottomWorld / TILE_WORLD_HEIGHT) * dims.height
  );

  const startCol = Math.floor(leftPx / TILE_SIZE);
  const endCol = Math.floor(Math.max(0, rightPx - 1) / TILE_SIZE);
  const startRow = Math.floor(topPx / TILE_SIZE);
  const endRow = Math.floor(Math.max(0, bottomPx - 1) / TILE_SIZE);

  for (let row = startRow; row <= endRow; row++) {
    for (let col = startCol; col <= endCol; col++) {
      addTile(level, col, row);
    }
  }
}

function getZoomTargetForHotspot(hotspotId) {
  const hotspot = document.querySelector('#' + hotspotId);
  if (!hotspot) return null;

  const pos = hotspot.getAttribute('position');

  // Move the camera toward the selected hotspot while keeping a comfortable distance.
  return {
    x: pos.x,
    y: pos.y,
    z: -1.15
  };
}

function showNestedDetailsFor(hotspotId) {
  hideCaptainDetails();

  if (hotspotId === 'captain') {
    showCaptainDetails();
  }

  // Additional nested-detail groups can be added later using the same pattern.
}

function zoomToHotspot(hotspotId) {
  if (focusedHotspotId || focusTransitioning) return;

  const target = getZoomTargetForHotspot(hotspotId);
  if (!target) return;

  focusTransitioning = true;
  focusedHotspotId = hotspotId;

  loadTilesAroundHotspot(hotspotId, MAX_LEVEL, 0.26);

  // Allow tile loading to begin before the camera movement.
  setTimeout(() => {
    mainCamera.setAttribute(
      'animation__focusPosition',
      `property: position; to: ${target.x} ${target.y} ${target.z}; dur: 800; easing: easeInOutQuad`
    );

    setTimeout(() => {
      focusTransitioning = false;
      showNestedDetailsFor(hotspotId);
      backButton.style.display = 'block';
    }, 820);
  }, 250);
}

function switchFocusToHotspot(hotspotId) {
  if (!hotspotId || hotspotId === focusedHotspotId || focusTransitioning) return;

  clearTimeout(focusLeaveTimer);
  focusTransitioning = true;
  hideInfo();
  hideCaptainDetails();
  clearHighResolutionTiles();

  const target = getZoomTargetForHotspot(hotspotId);
  if (!target) {
    focusTransitioning = false;
    return;
  }

  focusedHotspotId = hotspotId;
  loadTilesAroundHotspot(hotspotId, MAX_LEVEL, 0.26);

  mainCamera.setAttribute(
    'animation__focusPosition',
    `property: position; to: ${target.x} ${target.y} ${target.z}; dur: 650; easing: easeInOutQuad`
  );

  setTimeout(() => {
    focusTransitioning = false;
    showNestedDetailsFor(hotspotId);
    backButton.style.display = 'block';
  }, 680);
}

function returnFromFocus() {
  clearTimeout(focusLeaveTimer);
  if (!focusedHotspotId && !focusTransitioning) return;

  focusTransitioning = true;
  hideInfo();
  hideCaptainDetails();
  backButton.style.display = 'none';

  mainCamera.setAttribute(
    'animation__focusPosition',
    'property: position; to: 0 1.6 0; dur: 800; easing: easeInOutQuad'
  );

  setTimeout(() => {
    clearHighResolutionTiles();
    focusedHotspotId = null;
    focusTransitioning = false;
  }, 820);
}

let pageReady = false;
let currentLanguage = null;
let tourMode = null;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;
let infoTimer = null;

const galleryHotspots = [
  'captain','lieutenant','girl','drummer','flag',
  'musketeer','dog','leftGroup','rightGroup','backgroundArch'
];

const curatorHotspots = [
  ...galleryHotspots,
  'chickenClaws','drinkingHorn','weapons','spears',
  'light','shield','captainHand','redSash'
];

const hotspotTexts = {

  },
  lieutenant: {
    en: 'Lieutenant Willem van Ruytenburch\n\nThe lieutenant stands beside the captain in bright yellow clothing, helping draw the viewer’s eye to the center.',
    ar: 'الملازم فيليم فان رويتنبرخ\n\nيقف بجانب القائد بملابس صفراء لامعة، مما يجذب نظر المشاهد نحو مركز اللوحة.'
  },
  girl: {

    ar: 'الفتاة المضيئة\n\nليست عضوة عادية في الحرس، بل تظهر كشخصية رمزية تحمل أشياء مرتبطة بهوية الفرقة.'
  },
  drummer: {

    ar: 'قارِع الطبل\n\nيضيف الإيقاع والصوت والحركة، فيجعل المشهد يبدو كفرقة تستعد للسير.'
  },
  flag: {

    ar: 'حامل الراية\n\nتُعرّف الراية بفرقة الحرس وتضيف طابعًا احتفاليًا إلى المشهد.'

    ar: 'حامل البندقية\n\nيشير الحراس المسلحون إلى دور وتدريب الميليشيا المدنية.'
  },

    ar: 'الكلب\n\nتفصيل صغير وحيوي قرب قارع الطبل، يضيف عفوية وإحساسًا بالحياة اليومية.'

    en: 'Spears and Lines\n\nThe long spears and poles create diagonal lines that guide the viewer’s eye through the painting.',
    ar: 'الرماح والخطوط\n\nتخلق الرماح والعصي الطويلة خطوطًا قطرية تقود عين المشاهد عبر اللوحة.'
  },
  light: {
    en: 'Light and Shadow\n\nRembrandt uses strong contrasts of light and darkness to guide attention and create drama.',
    ar: 'الضوء والظل\n\nيستخدم رامبرانت تباينًا قويًا بين الضوء والظلام لتوجيه الانتباه وخلق الدراما.'
  },
  shield: {
    en: 'Shield with Names\n\nA shield in the background records the names of members of the company, connecting the painting to its patrons.',
    ar: 'درع الأسماء\n\nيسجل الدرع في الخلفية أسماء أعضاء الفرقة، ويربط اللوحة بمن كلفوا برسمها.'
  }
};

function selectLanguage(language) {
  currentLanguage = language;
  tourMode = 'curator';
  updateVisibleHotspots();
  startExperience();
}

function updateVisibleHotspots() {
  document.querySelectorAll('.hotspot').forEach(el => {
    if (el.classList.contains('captainDetail')) {
      el.setAttribute('visible', false);
    } else {
      el.setAttribute('visible', true);
    }
  });
}

function showCaptainDetails() {
  if (tourMode !== 'curator') return;
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', true);
  });
}

function hideCaptainDetails() {
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', false);
  });
}

function getHaloForHotspot(id) {
  return document.querySelector('#' + id + 'Halo');
}

function showHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.setAttribute('visible', true);
  halo.setAttribute(
    'animation',
    'property: material.opacity; from:0.04; to:0.12; dur:2800; dir:alternate; loop:true'
  );
}

function hideHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.removeAttribute('animation');
  halo.setAttribute('visible', false);
}

function hideAllHalos() {
  Object.keys(hotspotTexts).forEach(id => hideHalo(id));
}

function makeCanvasTexture(text, language, width = 650, height = 250) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17, 17, 17, 0.68)';
  roundRect(ctx, 0, 0, width, height, 34);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '25px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 52, 38, width - 90, 46);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '24px Arial, sans-serif';
    drawWrappedText(ctx, text, 52, 38, width - 90, 46);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const texture = makeCanvasTexture(text, language);
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = texture;
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 800 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  if (pos.x > 0.8) panelX = pos.x - 0.68;

  let panelY = pos.y + 0.25;
  if (pos.y > 2.0) panelY = pos.y - 0.42;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(infoPanel, text, currentLanguage);
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  activeHotspot = null;
}

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage) return;

    clearTimeout(focusLeaveTimer);
    clearTimeout(infoTimer);
    clearTimeout(closeTimer);

    showHalo(id);

    infoTimer = setTimeout(() => {
      showInfo(hotspotTexts[id][currentLanguage], el);

      if (focusedHotspotId && focusedHotspotId !== id && !focusTransitioning) {
        switchFocusToHotspot(id);
        return;
      }

      if (
        !el.classList.contains('captainDetail') &&
        !focusedHotspotId &&
        !focusTransitioning
      ) {
        setTimeout(() => {
          zoomToHotspot(id);
        }, 350);
      }
    }, 2000);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(infoTimer);
    hideHalo(id);

    if (focusedHotspotId === id && !focusTransitioning) {
      focusLeaveTimer = setTimeout(() => {
        returnFromFocus();
      }, 650);
      return;
    }

    if (!(focusedHotspotId === id || focusTransitioning)) {
      hideInfo();
    }
  });
}

function startExperience() {
  pageReady = true;
  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);

  const welcomeText =
    currentLanguage === 'ar'
      ? 'انظر إلى أي عنصر مميز لمدة ثانيتين لفتح عرضه القريب عالي الدقة.'
      : 'Gaze at any highlighted element for two seconds to open its high-resolution close view.';

  setPanelText(welcomePanel, welcomeText, currentLanguage);
  welcomePanel.setAttribute('visible', true);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);
  }, 3500);
}

window.addEventListener('keydown', event => {
  if (event.key === 'Escape' && (focusedHotspotId || focusTransitioning)) {
    returnFromFocus();
  }
});

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('load', () => {
  hideInfo();
  hideAllHalos();
  pageReady = false;
  currentLanguage = null;
  tourMode = null;
  gazeCursor.setAttribute('visible', false);

  document.querySelectorAll('.hotspot').forEach(el => {
    el.setAttribute('visible', false);
  });
});
</script>
