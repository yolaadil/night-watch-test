<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch Interactive</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <a-image
    src="painting.jpg"
    position="0 1.6 -3"
    width="4"
    height="3.45">
  </a-image>

  <!-- HALOS: hidden by default -->
  <a-circle id="captainHalo" position="-0.05 1.35 -2.94" radius="0.25" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="lieutenantHalo" position="0.45 1.30 -2.94" radius="0.25" color="#fff2aa" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="girlHalo" position="-0.80 1.18 -2.94" radius="0.22" color="#fff7c2" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="drummerHalo" position="1.75 1.25 -2.94" radius="0.25" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="flagHalo" position="-1.08 1.95 -2.94" radius="0.32" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="musketeerHalo" position="-1.10 1.45 -2.94" radius="0.22" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="dogHalo" position="0.95 0.75 -2.94" radius="0.18" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="leftGroupHalo" position="-1.55 1.55 -2.94" radius="0.28" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="rightGroupHalo" position="1.35 1.60 -2.94" radius="0.28" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>
  <a-circle id="backgroundArchHalo" position="0.45 2.25 -2.94" radius="0.30" color="#ffe680" visible="false" material="transparent:true; opacity:0.22"></a-circle>

  <!-- INVISIBLE HOTSPOTS -->
  <a-plane class="hotspot" id="captain" position="-0.05 1.35 -2.95" width="0.35" height="0.75" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="lieutenant" position="0.45 1.30 -2.95" width="0.35" height="0.80" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="girl" position="-0.80 1.18 -2.95" width="0.32" height="0.60" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="drummer" position="1.75 1.25 -2.95" width="0.38" height="0.80" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="flag" position="-1.08 1.95 -2.95" width="0.95" height="0.65" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="musketeer" position="-1.10 1.45 -2.95" width="0.35" height="0.65" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="dog" position="0.95 0.75 -2.95" width="0.35" height="0.25" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="leftGroup" position="-1.55 1.55 -2.95" width="0.42" height="0.75" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="rightGroup" position="1.35 1.60 -2.95" width="0.50" height="0.80" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot" id="backgroundArch" position="0.45 2.25 -2.95" width="0.80" height="0.55" material="opacity:0; transparent:true"></a-plane>

  <!-- INFO PANEL -->
  <a-plane
    id="infoPanel"
    visible="false"
    position="0 0 -2.8"
    width="1.65"
    height="0.66"
    material="color:#111; opacity:0.65; transparent:true">
  </a-plane>

  <a-text
    id="infoText"
    visible="false"
    value=""
    position="0 -0.08 -2.75"
    width="1.18"
    color="white">
  </a-text>

  <!-- LANGUAGE MENU -->
  <a-entity id="languageMenu" position="0 1.6 -2.2" visible="true">
    <a-plane
      width="2.35"
      height="1.35"
      material="color:#111; opacity:0.78; transparent:true">
    </a-plane>

    <a-text
      value="The Night Watch"
      position="-0.62 0.43 0.03"
      width="1.6"
      color="#ffe680"
      align="center">
    </a-text>

    <a-text
      value="Choose language / اختر اللغة"
      position="-0.82 0.22 0.03"
      width="1.65"
      color="white"
      align="center">
    </a-text>

    <a-plane
      id="englishBtn"
      class="menuButton"
      position="-0.52 -0.20 0.04"
      width="0.82"
      height="0.36"
      material="color:#333; opacity:0.95">
    </a-plane>

    <a-text
      value="English"
      position="-0.72 -0.26 0.07"
      width="1.1"
      color="white">
    </a-text>

    <a-plane
      id="arabicBtn"
      class="menuButton"
      position="0.52 -0.20 0.04"
      width="0.82"
      height="0.36"
      material="color:#333; opacity:0.95">
    </a-plane>

    <a-text
      value="العربية"
      position="0.28 -0.26 0.07"
      width="1.1"
      color="white"
      align="center">
    </a-text>

    <a-text
      value="Gaze at a language for 2 seconds"
      position="-0.72 -0.52 0.03"
      width="1.45"
      color="#dddddd"
      align="center">
    </a-text>
  </a-entity>

  <!-- WELCOME / INSTRUCTION -->
  <a-text
    id="welcome"
    value=""
    visible="false"
    position="-0.85 0.55 -2.8"
    width="1.25"
    color="black">
  </a-text>

  <!-- CAMERA -->
  <a-camera position="0 1.6 0">
    <a-cursor
      id="gazeCursor"
      visible="true"
      fuse="true"
      fuse-timeout="2000"
      raycaster="objects: .hotspot, .menuButton"
      color="black">
    </a-cursor>
  </a-camera>

</a-scene>

<script>
const infoPanel = document.querySelector('#infoPanel');
const infoText = document.querySelector('#infoText');
const welcome = document.querySelector('#welcome');
const gazeCursor = document.querySelector('#gazeCursor');
const languageMenu = document.querySelector('#languageMenu');
const englishBtn = document.querySelector('#englishBtn');
const arabicBtn = document.querySelector('#arabicBtn');

let pageReady = false;
let currentLanguage = null;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;

const hotspotTexts = {
  captain: {
    en: 'Captain Frans Banning Cocq\n\nLeader of the Amsterdam civic guard and the central figure of the composition.',
    ar: 'الكابتن فرانس بانينغ كوك\n\nقائد الحرس المدني في أمستردام، وهو الشخصية المركزية في التكوين.'
  },
  lieutenant: {
    en: 'Lieutenant Willem van Ruytenburch\n\nRecognizable by his bright yellow costume and illuminated appearance.',
    ar: 'الملازم فيليم فان رويتنبرخ\n\nيمكن تمييزه من خلال ملابسه الصفراء الساطعة وحضوره المضيء.'
  },
  girl: {
    en: 'The Girl with the Chicken\n\nA symbolic figure carrying objects associated with the civic guard.',
    ar: 'الفتاة التي تحمل الدجاجة\n\nشخصية رمزية تحمل أشياء مرتبطة بالحرس المدني.'
  },
  drummer: {
    en: 'The Drummer\n\nAdds energy and movement, helping create the feeling of a marching company.',
    ar: 'قارِع الطبل\n\nيضيف طاقة وحركة، ويساعد في خلق إحساس بفرقة تسير للأمام.'
  },
  flag: {
    en: 'The Flag Bearer\n\nThe militia flag identifies the company and adds drama to the scene.',
    ar: 'حامل الراية\n\nتُعرّف راية الميليشيا بالفرقة وتضيف طابعًا دراميًا إلى المشهد.'
  },
  musketeer: {
    en: 'The Musketeer\n\nOne of several armed guards demonstrating the company in action.',
    ar: 'حامل البندقية\n\nأحد الحراس المسلحين الذين يُظهرون الفرقة أثناء الحركة.'
  },
  dog: {
    en: 'The Dog\n\nA small detail that adds realism and movement to the composition.',
    ar: 'الكلب\n\nتفصيل صغير يضيف واقعية وحركة إلى التكوين.'
  },
  leftGroup: {
    en: 'Left Group of Guards\n\nThese figures create depth and lead the viewer into the painting.',
    ar: 'مجموعة الحراس اليسرى\n\nتخلق هذه الشخصيات عمقًا بصريًا وتقود نظر المشاهد إلى داخل اللوحة.'
  },
  rightGroup: {
    en: 'Right Group of Guards\n\nBalances the composition and frames the main subjects.',
    ar: 'مجموعة الحراس اليمنى\n\nتوازن التكوين وتؤطر الشخصيات الرئيسية.'
  },
  backgroundArch: {
    en: 'Background Architecture\n\nThe dark architectural setting enhances the dramatic lighting.',
    ar: 'الخلفية المعمارية\n\nتعزز الخلفية المعمارية الداكنة الإضاءة الدرامية في اللوحة.'
  }
};

function getHaloForHotspot(id) {
  return document.querySelector('#' + id + 'Halo');
}

function showHalo(halo) {
  if (!halo) return;

  halo.setAttribute('visible', true);
  halo.setAttribute(
    'animation',
    'property: material.opacity; from:0.03; to:0.12; dur:2500; dir:alternate; loop:true'
  );
}

function hideHalo(halo) {
  if (!halo) return;

  halo.removeAttribute('animation');
  halo.setAttribute('visible', false);
}

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 1000 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  let textX = pos.x + 0.18;

  if (pos.x > 0.8) {
    panelX = pos.x - 0.68;
    textX = pos.x - 1.13;
  }

  let panelY = pos.y + 0.22;
  let textY = pos.y + 0.30;

  if (pos.y > 2.0) {
    panelY = pos.y - 0.42;
    textY = pos.y - 0.35;
  }

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  infoText.setAttribute('position', `${textX} ${textY} -2.75`);

  infoPanel.setAttribute('visible', true);
  infoText.setAttribute('visible', true);
  infoText.setAttribute('value', text);

  if (currentLanguage === 'ar') {
    infoText.setAttribute('align', 'right');
    infoText.setAttribute('width', '1.2');
  } else {
    infoText.setAttribute('align', 'left');
    infoText.setAttribute('width', '1.18');
  }
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  infoText.setAttribute('visible', false);
  infoText.setAttribute('value', '');
  activeHotspot = null;
}

function hideInfoDelayed(hotspot) {
  clearTimeout(closeTimer);

  closeTimer = setTimeout(() => {
    if (activeHotspot === hotspot) {
      hideInfo();
    }
  }, 1000);
}

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  const halo = getHaloForHotspot(id);

  el.addEventListener('click', () => {
    if (!pageReady || !currentLanguage) return;

    showHalo(halo);
    showInfo(hotspotTexts[id][currentLanguage], el);
  });

  el.addEventListener('mouseleave', () => {
    hideHalo(halo);
    hideInfoDelayed(el);
  });
}

function startExperience(language) {
  currentLanguage = language;
  pageReady = true;

  languageMenu.setAttribute('visible', false);
  welcome.setAttribute('visible', true);
  gazeCursor.setAttribute('visible', true);

  if (language === 'ar') {
    welcome.setAttribute('value', 'انظر إلى التفاصيل المضيئة في اللوحة لاكتشاف الشرح.');
    welcome.setAttribute('align', 'right');
    welcome.setAttribute('position', '-0.2 0.55 -2.8');
  } else {
    welcome.setAttribute('value', 'Look at highlighted details in the painting to discover more.');
    welcome.setAttribute('align', 'left');
    welcome.setAttribute('position', '-0.85 0.55 -2.8');
  }

  setTimeout(() => {
    welcome.setAttribute('visible', false);
  }, 3500);
}

englishBtn.addEventListener('click', () => {
  startExperience('en');
});

arabicBtn.addEventListener('click', () => {
  startExperience('ar');
});

addHotspot('captain');
addHotspot('lieutenant');
addHotspot('girl');
addHotspot('drummer');
addHotspot('flag');
addHotspot('musketeer');
addHotspot('dog');
addHotspot('leftGroup');
addHotspot('rightGroup');
addHotspot('backgroundArch');

window.addEventListener('load', () => {
  hideInfo();
  pageReady = false;
  currentLanguage = null;
  languageMenu.setAttribute('visible', true);
  welcome.setAttribute('visible', false);
  gazeCursor.setAttribute('visible', true);
});
</script>

</body>
</html>
