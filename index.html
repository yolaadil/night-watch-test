<script>
AFRAME.registerComponent('blurred-copy', {
  schema: {
    source: { type: 'string' },
    radius: { type: 'number', default: 4 }
  },

  init() {
    const image = new Image();
    image.crossOrigin = 'anonymous';

    image.onload = () => {
      const scale = 0.32;
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
      canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));

      const ctx = canvas.getContext('2d');
      ctx.filter = `blur(${this.data.radius}px)`;
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;

      const apply = () => {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;

        mesh.material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          depthWrite: false,
          toneMapped: false
        });
      };

      if (this.el.getObject3D('mesh')) {
        apply();
      } else {
        this.el.addEventListener('object3dset', apply, { once: true });
      }
    };

    image.src = this.data.source;
  }
});
</script>

  dog:            { cueW: 0.26, cueH: 0.16, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.66, focusH: 0.40 },
  leftGroup:      { cueW: 0.30, cueH: 0.40, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.74, focusH: 0.96 },
  rightGroup:     { cueW: 0.34, cueH: 0.42, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.86, focusH: 1.02 },
  backgroundArch: { cueW: 0.34, cueH: 0.22, cueOffsetX: 0.00, cueOffsetY: 0.00, focusW: 0.96, focusH: 0.68 }
};

const State = Object.freeze({
  IDLE: 'IDLE',
  CUE: 'CUE',
  WAIT_GAZE: 'WAIT_GAZE',
  ZOOMING: 'ZOOMING',
  STORY: 'STORY',
  RETURNING: 'RETURNING',
  FREE: 'FREE'
});

let currentLanguage = null;
let pageReady = false;
let gazeTimer = null;
let speechUtterance = null;
let voices = [];

function levelDimensions(level) {
  const scale = Math.pow(2, level - MAX_LEVEL);
  return {
    width: Math.ceil(IMAGE_WIDTH * scale),
    height: Math.ceil(IMAGE_HEIGHT * scale)
  };
}

function tileGeometry(level, col, row) {
  const dims = levelDimensions(level);
  const coreX = col * TILE_SIZE;
  const coreY = row * TILE_SIZE;

  if (coreX >= dims.width || coreY >= dims.height) return null;

  const columns = Math.ceil(dims.width / TILE_SIZE);
  const rows = Math.ceil(dims.height / TILE_SIZE);

  const leftOverlap = col === 0 ? 0 : TILE_OVERLAP;
  const topOverlap = row === 0 ? 0 : TILE_OVERLAP;
  const rightOverlap = col === columns - 1 ? 0 : TILE_OVERLAP;
  const bottomOverlap = row === rows - 1 ? 0 : TILE_OVERLAP;

  const fileX = Math.max(0, coreX - leftOverlap);
  const fileY = Math.max(0, coreY - topOverlap);
  const fileW = Math.min(
    TILE_SIZE + leftOverlap + rightOverlap,
    dims.width - fileX
  );
  const fileH = Math.min(
    TILE_SIZE + topOverlap + bottomOverlap,
    dims.height - fileY
  );

  return {
    dims,
    fileX,
    fileY,
    fileW,
    fileH,
    worldW: fileW / dims.width * WORLD_WIDTH,
    worldH: fileH / dims.height * WORLD_HEIGHT,
    centerX: ((fileX + fileW / 2) / dims.width - 0.5) * WORLD_WIDTH,
    centerY: (0.5 - (fileY + fileH / 2) / dims.height) * WORLD_HEIGHT
  };
}

function hotspotCenter(id) {
  const hotspot = document.querySelector('#' + id);
  const pos = hotspot.getAttribute('position');
  return { x: pos.x, y: pos.y - 1.6 };
}

function tileRangeFor(id, width, height, offsetX = 0, offsetY = 0) {
  const baseCenter = hotspotCenter(id);
  const center = {
    x: baseCenter.x + offsetX,
    y: baseCenter.y + offsetY
  };
  const dims = levelDimensions(MAX_LEVEL);

  const leftPx = Math.max(
    0,
    ((center.x - width / 2) / WORLD_WIDTH + 0.5) * dims.width
  );
  const rightPx = Math.min(
    dims.width,
    ((center.x + width / 2) / WORLD_WIDTH + 0.5) * dims.width
  );
  const topPx = Math.max(
    0,
    (0.5 - (center.y + height / 2) / WORLD_HEIGHT) * dims.height
  );
  const bottomPx = Math.min(
    dims.height,
    (0.5 - (center.y - height / 2) / WORLD_HEIGHT) * dims.height
  );

  return {
    center,
    startCol: Math.floor(leftPx / TILE_SIZE),
    endCol: Math.floor(Math.max(0, rightPx - 1) / TILE_SIZE),
    startRow: Math.floor(topPx / TILE_SIZE),
    endRow: Math.floor(Math.max(0, bottomPx - 1) / TILE_SIZE)
  };
}

function animateOpacity(object3D, target, duration = 450) {
  if (!object3D) return;

  const materials = [];
  object3D.traverse(node => {
    if (node.material) materials.push(node.material);
  });

  const startValues = materials.map(material => material.opacity || 0);
  const started = performance.now();

  function frame(now) {
    const progress = Math.min(1, (now - started) / duration);
    const eased = progress * progress * (3 - 2 * progress);

    materials.forEach((material, index) => {
      material.transparent = true;
      material.opacity =
        startValues[index] +
        (target - startValues[index]) * eased;
      material.needsUpdate = true;
    });

    if (progress < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function setBlurOpacity(target, duration = 450) {
  const mesh = paintingBlur.getObject3D('mesh');
  if (!mesh || !mesh.material) return;

  const start = mesh.material.opacity || 0;
  const started = performance.now();

  function frame(now) {
    const progress = Math.min(1, (now - started) / duration);
    const eased = progress * progress * (3 - 2 * progress);

    mesh.material.opacity =
      start + (target - start) * eased;
    mesh.material.needsUpdate = true;

    if (progress < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

const CueCache = {
  entries: new Map(),

  async ensure(id) {
    if (this.entries.has(id)) {
      return this.entries.get(id);
    }

    const cfg = REGION[id];
    const range = tileRangeFor(
      id,
      cfg.cueW,
      cfg.cueH,
      cfg.cueOffsetX || 0,
      cfg.cueOffsetY || 0
    );
    const geometries = [];

    for (let row = range.startRow; row <= range.endRow; row++) {
      for (let col = range.startCol; col <= range.endCol; col++) {
        const geometry = tileGeometry(MAX_LEVEL, col, row);

        if (geometry) {
          geometries.push({ col, row, geometry });
        }
      }
    }

    if (!geometries.length) {
      throw new Error(`No cue tiles found for ${id}`);
    }

    const unionLeft = Math.min(
      ...geometries.map(item => item.geometry.fileX)
    );
    const unionTop = Math.min(
      ...geometries.map(item => item.geometry.fileY)
    );
    const unionRight = Math.max(
      ...geometries.map(
        item => item.geometry.fileX + item.geometry.fileW
      )
    );
    const unionBottom = Math.max(
      ...geometries.map(
        item => item.geometry.fileY + item.geometry.fileH
      )
    );

    const unionWidth = unionRight - unionLeft;
    const unionHeight = unionBottom - unionTop;

    const canvas = document.createElement('canvas');
    canvas.width = unionWidth;
    canvas.height = unionHeight;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, unionWidth, unionHeight);

    await Promise.all(
      geometries.map(({ col, row, geometry }) =>
        new Promise(resolve => {
          const image = new Image();
          image.crossOrigin = 'anonymous';

          image.onload = () => {
            const drawX = geometry.fileX - unionLeft;
            const drawY = geometry.fileY - unionTop;

            ctx.drawImage(
              image,
              drawX,
              drawY,
              geometry.fileW,
              geometry.fileH
            );

            resolve();
          };

          image.onerror = resolve;
          image.src =
            `${TILE_FOLDER}/${MAX_LEVEL}/${col}_${row}.jpeg`;
        })
      )
    );

    const imageCenterX =
      ((range.center.x / WORLD_WIDTH) + 0.5) * IMAGE_WIDTH;
    const imageCenterY =
      (0.5 - range.center.y / WORLD_HEIGHT) * IMAGE_HEIGHT;

    const maskCenterX = imageCenterX - unionLeft;
    const maskCenterY = imageCenterY - unionTop;
    const radiusX =
      cfg.cueW / 2 / WORLD_WIDTH * IMAGE_WIDTH;
    const radiusY =
      cfg.cueH / 2 / WORLD_HEIGHT * IMAGE_HEIGHT;

    ctx.globalCompositeOperation = 'destination-in';
    ctx.save();
    ctx.translate(maskCenterX, maskCenterY);
    ctx.scale(1, radiusY / Math.max(radiusX, 0.0001));

    const gradient = ctx.createRadialGradient(
      0, 0, radiusX * 0.02,
      0, 0, radiusX
    );

    gradient.addColorStop(0.00, 'rgba(255,255,255,1.00)');
    gradient.addColorStop(0.28, 'rgba(255,255,255,0.98)');
    gradient.addColorStop(0.48, 'rgba(255,255,255,0.82)');
    gradient.addColorStop(0.66, 'rgba(255,255,255,0.54)');
    gradient.addColorStop(0.82, 'rgba(255,255,255,0.25)');
    gradient.addColorStop(0.93, 'rgba(255,255,255,0.08)');
    gradient.addColorStop(1.00, 'rgba(255,255,255,0.00)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, radiusX, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = false;
    texture.needsUpdate = true;

    const dims = levelDimensions(MAX_LEVEL);
    const worldWidth =
      unionWidth / dims.width * WORLD_WIDTH;
    const worldHeight =
      unionHeight / dims.height * WORLD_HEIGHT;
    const centerX =
      ((unionLeft + unionWidth / 2) / dims.width - 0.5) *
      WORLD_WIDTH;
    const centerY =
      (0.5 - (unionTop + unionHeight / 2) / dims.height) *
      WORLD_HEIGHT;

    const plane = document.createElement('a-plane');
    plane.setAttribute('width', worldWidth);
    plane.setAttribute('height', worldHeight);
    plane.setAttribute('position', `${centerX} ${centerY} 0`);
    plane.setAttribute('visible', false);
    plane.dataset.target = id;

    const ready = new Promise(resolve => {
      plane.addEventListener(
        'loaded',
        () => {
          const mesh = plane.getObject3D('mesh');

          if (mesh) {
            mesh.material = new THREE.MeshBasicMaterial({
              map: texture,
              transparent: true,
              opacity: 0,
              side: THREE.DoubleSide,
              depthWrite: false,
              toneMapped: false,
              premultipliedAlpha: true
            });
          }

          resolve();
        },
        { once: true }
      );
    });

    cueLayer.appendChild(plane);
    await ready;

    const entry = { entity: plane, texture };
    this.entries.set(id, entry);
    return entry;
  },

  hideAll() {
    this.entries.forEach(entry => {
      entry.entity.setAttribute('visible', false);
    });
  }
};

let activeFocusTexture = null;

function clearFocusTiles() {
  focusLayer.innerHTML = '';

  if (activeFocusTexture) {
    activeFocusTexture.dispose();
    activeFocusTexture = null;
  }
}

async function loadFocusTiles(id) {
  clearFocusTiles();

  const cfg = REGION[id];
  const range = tileRangeFor(id, cfg.focusW, cfg.focusH);
  const geometries = [];

  for (let row = range.startRow; row <= range.endRow; row++) {
    for (let col = range.startCol; col <= range.endCol; col++) {
      const geometry = tileGeometry(MAX_LEVEL, col, row);

      if (geometry) {
        geometries.push({ col, row, geometry });
      }
    }
  }

  if (!geometries.length) return;

  const unionLeft = Math.min(
    ...geometries.map(item => item.geometry.fileX)
  );
  const unionTop = Math.min(
    ...geometries.map(item => item.geometry.fileY)
  );
  const unionRight = Math.max(
    ...geometries.map(
      item => item.geometry.fileX + item.geometry.fileW
    )
  );
  const unionBottom = Math.max(
    ...geometries.map(
      item => item.geometry.fileY + item.geometry.fileH
    )
  );

  const unionWidth = unionRight - unionLeft;
  const unionHeight = unionBottom - unionTop;

  const canvas = document.createElement('canvas');
  canvas.width = unionWidth;
  canvas.height = unionHeight;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, unionWidth, unionHeight);

  await Promise.all(
    geometries.map(({ col, row, geometry }) =>
      new Promise(resolve => {
        const image = new Image();
        image.crossOrigin = 'anonymous';

        image.onload = () => {
          ctx.drawImage(
            image,
            geometry.fileX - unionLeft,
            geometry.fileY - unionTop,
            geometry.fileW,
            geometry.fileH
          );
          resolve();
        };

        image.onerror = resolve;
        image.src =
          `${TILE_FOLDER}/${MAX_LEVEL}/${col}_${row}.jpeg`;
      })
    )
  );

  /* Removed rectangular edge mask so no visible boxes remain.
     The stitched focus image is shown directly. */
const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;
  texture.needsUpdate = true;
  activeFocusTexture = texture;

  const dims = levelDimensions(MAX_LEVEL);
  const worldWidth =
    unionWidth / dims.width * WORLD_WIDTH;
  const worldHeight =
    unionHeight / dims.height * WORLD_HEIGHT;
  const centerX =
    ((unionLeft + unionWidth / 2) / dims.width - 0.5) *
    WORLD_WIDTH;
  const centerY =
    (0.5 - (unionTop + unionHeight / 2) / dims.height) *
    WORLD_HEIGHT;

  const plane = document.createElement('a-plane');
  plane.setAttribute('width', worldWidth);
  plane.setAttribute('height', worldHeight);
  plane.setAttribute('position', `${centerX} ${centerY} 0`);

  plane.addEventListener(
    'loaded',
    () => {
      const mesh = plane.getObject3D('mesh');

      if (!mesh) return;

      mesh.material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        side: THREE.DoubleSide,
        depthWrite: false,
        depthTest: true,
        toneMapped: false,
        premultipliedAlpha: true
      });

      const started = performance.now();

      function fade(now) {
        const progress = Math.min(
          1,
          (now - started) / 500
        );
        const eased =
          progress * progress * (3 - 2 * progress);

        mesh.material.opacity = eased;
        mesh.material.needsUpdate = true;

        if (progress < 1) {
          requestAnimationFrame(fade);
        }
      }

      requestAnimationFrame(fade);
    },
    { once: true }
  );

  focusLayer.appendChild(plane);
}

function refreshVoices() {
  if (!('speechSynthesis' in window)) return;
  voices = window.speechSynthesis.getVoices();
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.addEventListener('voiceschanged', refreshVoices);
}

function stopSpeech() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  speechUtterance = null;
}

function speak(text) {
  if (!('speechSynthesis' in window) || !text) return;

  stopSpeech();
  refreshVoices();

  const prefix = currentLanguage === 'ar' ? 'ar' : 'en';
  const preferred = voices.find(v =>
    v.lang.toLowerCase().startsWith(prefix) &&
    /aria|jenny|samantha|daniel|salma|hamed|google/i.test(v.name)
  ) || voices.find(v => v.lang.toLowerCase().startsWith(prefix));

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = currentLanguage === 'ar' ? 'ar-SA' : 'en-US';
  utterance.rate = currentLanguage === 'ar' ? 0.88 : 0.92;
  utterance.pitch = 0.97;
  if (preferred) utterance.voice = preferred;

  speechUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function standardNarration(id) {
  const raw = hotspotTexts[id][currentLanguage];
  return raw.replace(/\n+/g, ' ');
}

function makeCanvasTexture(text, language, width = 520, height = 190) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17,17,17,0.72)';
  roundRect(ctx, 0, 0, width, height, 26);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '22px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 38, 26, width - 68, 36);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '21px Arial, sans-serif';
    drawWrappedText(ctx, text, 38, 26, width - 68, 36);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';

      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = makeCanvasTexture(text, language);
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(id) {
  const hotspot = document.querySelector('#' + id);
  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.52;
  if (pos.x > 0.8) panelX = pos.x - 0.52;

  let panelY = pos.y + 0.20;
  if (pos.y > 2.0) panelY = pos.y - 0.32;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(
    infoPanel,
    hotspotTexts[id][currentLanguage],
    currentLanguage
  );
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
}

function showPrimaryHotspots(show) {
  document.querySelectorAll('.hotspot').forEach(el => {
    if (el.classList.contains('captainDetail')) {
      el.setAttribute('visible', false);
    } else {
      el.setAttribute('visible', show);
    }
  });
}

function showNestedDetails(id) {
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', id === 'captain');
  });
}

const TourEngine = {
  state: State.IDLE,
  index: 0,
  target: null,
  pulseToken: 0,
  autoTimer: null,

  setState(next) {
    this.state = next;
    console.log('[Tour state]', next);
  },

  async startCue(id) {
    clearTimeout(this.autoTimer);
    this.pulseToken += 1;
    const token = this.pulseToken;

    this.target = id;
    this.setState(State.CUE);
    CueCache.hideAll();
    setBlurOpacity(0, 150);

    const entry = await CueCache.ensure(id);
    if (token !== this.pulseToken) return;

    entry.entity.setAttribute('visible', true);
    animateOpacity(entry.entity.object3D, 0.38, 300);

    for (let cycle = 0; cycle < 4; cycle++) {
      if (token !== this.pulseToken || this.state === State.ZOOMING) return;

      await this.wait(140);
      setBlurOpacity(0.38, 500);
      animateOpacity(entry.entity.object3D, 0.82, 500);
      await this.wait(560);

      setBlurOpacity(0, 500);
      animateOpacity(entry.entity.object3D, 0.34, 500);
      await this.wait(560);
    }

    if (token !== this.pulseToken) return;

    setBlurOpacity(0, 250);
    animateOpacity(entry.entity.object3D, 0.42, 250);
    this.setState(State.WAIT_GAZE);

    const nextId = STORY_ORDER[this.index + 1];
    if (nextId) {
      CueCache.ensure(nextId).catch(console.warn);
    }
  },

  confirmGaze(id) {
    if (this.state === State.FREE) {
      this.openTarget(id, false);
      return;
    }

    if (
      (this.state === State.CUE || this.state === State.WAIT_GAZE) &&
      id === this.target
    ) {
      this.openTarget(id, true);
    }
  },

  async openTarget(id, orderedStory) {
    this.pulseToken += 1;
    this.setState(State.ZOOMING);
    clearTimeout(this.autoTimer);
    setBlurOpacity(0, 250);
    CueCache.hideAll();
    showPrimaryHotspots(false);
    await loadFocusTiles(id);

    const hotspot = document.querySelector('#' + id);
    const pos = hotspot.getAttribute('position');

    setTimeout(() => {
      mainCamera.setAttribute(
        'animation__focus',
        `property: position; to: ${pos.x} ${pos.y} -1.15; dur: 850; easing: easeInOutQuad`
      );
    }, 220);

    setTimeout(() => {
      this.setState(State.STORY);
      showInfo(id);
      showNestedDetails(id);
      backButton.style.display = 'block';

      const narration = orderedStory
        ? STORY_TEXT[id][currentLanguage]
        : standardNarration(id);

      speak(narration);

      if (orderedStory) {
        const words = narration.trim().split(/\s+/).length;
        const narrationMs = Math.max(7000, words * 430);

        this.autoTimer = setTimeout(() => {
          if (this.state === State.STORY && this.target === id) {
            this.returnFromTarget(true);
          }
        }, narrationMs + 1200);
      }
    }, 850);
  },

  returnFromTarget(advanceStory) {
    if (
      this.state !== State.STORY &&
      this.state !== State.ZOOMING
    ) return;

    clearTimeout(this.autoTimer);
    stopSpeech();
    this.setState(State.RETURNING);
    hideInfo();
    showNestedDetails(null);
    backButton.style.display = 'none';

    mainCamera.setAttribute(
      'animation__focus',
      'property: position; to: 0 1.6 0; dur: 800; easing: easeInOutQuad'
    );

    setTimeout(() => {
      clearFocusTiles();
      showPrimaryHotspots(true);

      if (advanceStory) {
        this.index += 1;

        if (this.index >= STORY_ORDER.length) {
          this.target = null;
          this.setState(State.FREE);
          CueCache.hideAll();
          setBlurOpacity(0, 250);

          const ending =
            currentLanguage === 'ar'
              ? 'انتهت القصة الموجهة. يمكنك الآن استكشاف أي عنصر بحرية.'
              : 'The guided story is complete. You can now explore any element freely.';

          setPanelText(welcomePanel, ending, currentLanguage);
          welcomePanel.setAttribute('visible', true);
          speak(ending);

          setTimeout(() => {
            welcomePanel.setAttribute('visible', false);
          }, 4500);
        } else {
          this.startCue(STORY_ORDER[this.index]);
        }
      } else {
        this.setState(State.FREE);
        this.target = null;
      }
    }, 830);
  },

  manualBack() {
    this.returnFromTarget(false);
  },

  wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
};

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage) return;

    clearTimeout(gazeTimer);

    gazeTimer = setTimeout(() => {
      if (el.classList.contains('captainDetail')) {
        showInfo(id);
        speak(standardNarration(id));
        return;
      }

      TourEngine.confirmGaze(id);
    }, el.classList.contains('captainDetail') ? 2000 : GAZE_MS);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(gazeTimer);

    if (el.classList.contains('captainDetail')) {
      hideInfo();
    }
  });
}

function selectLanguage(language) {
  currentLanguage = language;
  pageReady = true;
  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);
  showPrimaryHotspots(true);
  refreshVoices();

  const welcome =
    language === 'ar'
      ? 'مرحبًا بك في الحراسة الليلية. ستقودك اللوحة بصريًا من تفصيل إلى آخر.'
      : 'Welcome to The Night Watch. The painting will guide your attention from one detail to the next.';

  setPanelText(welcomePanel, welcome, language);
  welcomePanel.setAttribute('visible', true);
  speak(welcome);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);
    TourEngine.index = 0;
    TourEngine.startCue(STORY_ORDER[0]);

    setTimeout(() => {
      CueCache.ensure(STORY_ORDER[1]).catch(console.warn);
    }, 900);
  }, 4200);
}

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('keydown', event => {
  if (event.key === 'Escape') {
    TourEngine.manualBack();
  }
});

window.addEventListener('load', () => {
  pageReady = false;
  gazeCursor.setAttribute('visible', false);
  infoPanel.setAttribute('visible', false);
  welcomePanel.setAttribute('visible', false);
  showPrimaryHotspots(false);
  setBlurOpacity(0, 0);
});
</script>

</body>
</html>
