<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch Interactive</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, Tahoma, sans-serif;
}

#languageOverlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
}

#languageBox {
  width: min(520px, 90vw);
  background: rgba(20,20,20,0.94);
  color: white;
  border-radius: 18px;
  padding: 28px 24px;
  text-align: center;
}

#languageBox h1 {
  margin: 0 0 12px;
  color: #ffe680;
  font-size: 30px;
}

#languageBox p {
  color: #ddd;
  font-size: 17px;
}

.languageButton {
  cursor: pointer;
  border: none;
  border-radius: 12px;
  padding: 13px 22px;
  margin: 8px;
  font-size: 18px;
  background: #333;
  color: white;
}

.languageButton:hover {
  background: #555;
}

.tourOption {
  background: #2b2b2b;
  border: 1px solid #444;
  border-radius: 14px;
  padding: 15px;
  margin: 12px 0;
  cursor: pointer;
}

.tourOption:hover {
  background: #444;
  border-color: #ffe680;
}

.tourOption h2 {
  margin: 0 0 7px;
  color: #ffe680;
  font-size: 20px;
}

.tourOption p {
  margin: 0;
  font-size: 15px;
  color: #ddd;
}


#tileControls {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9998;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

#storyStatus {
  padding: 9px 12px;
  border-radius: 10px;
  background: rgba(20,20,20,0.72);
  color: #ffe680;
  font-size: 13px;
  min-width: 160px;
}

.tileButton {
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  background: rgba(20,20,20,0.82);
  color: white;
  cursor: pointer;
  font-size: 14px;
}

.tileButton:hover {
  background: rgba(60,60,60,0.92);
}

</style>
</head>

<body>
<div id="tileControls">
  <button class="tileButton" onclick="storyEngine.start()">Start story</button>
  <button class="tileButton" onclick="storyEngine.next()">Next</button>
  <button class="tileButton" onclick="storyEngine.stop()">Clear</button>
  <span id="storyStatus">Ready</span>
</div>


<div id="languageOverlay">
  <div id="languageBox">
    <h1>The Night Watch</h1>
    <p>Choose language / اختر اللغة</p>
    <button class="languageButton" onclick="selectLanguage('en')">English</button>
    <button class="languageButton" onclick="selectLanguage('ar')">العربية</button>
  </div>
</div>

  <a-plane class="hotspot curatorOnly" id="weapons" position="-1.00 1.35 -2.95" width="0.36" height="0.45" material="opacity:0; transparent:true"></a-plane>

<script>
const infoPanel = document.querySelector('#infoPanel');
const welcomePanel = document.querySelector('#welcomePanel');
const gazeCursor = document.querySelector('#gazeCursor');
const languageOverlay = document.querySelector('#languageOverlay');
const languageBox = document.querySelector('#languageBox');
const tileLayer = document.querySelector('#tileLayer');
const storyStatus = document.querySelector('#storyStatus');

/*
 * Deep Zoom metadata from painting.dzi.
 * The loader also tries to read painting.dzi at runtime, so these values are
 * safe fallbacks when the file is unavailable during local testing.
 */
const deepZoom = {
  width: 15354,
  height: 13230,
  tileSize: 254,
  overlap: 1,
  format: 'jpeg',
  maxLevel: 14,
  folder: 'tiles',
  worldWidth: 4,
  worldHeight: 3.45
};

function setStoryStatus(message) {
  storyStatus.textContent = message;
}

async function loadDeepZoomMetadata() {
  try {
    const response = await fetch('painting.dzi', { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const xmlText = await response.text();
    const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
    const imageNode = xml.querySelector('Image');
    const sizeNode = xml.querySelector('Size');

    if (!imageNode || !sizeNode) throw new Error('Invalid DZI metadata');

    deepZoom.tileSize = Number(imageNode.getAttribute('TileSize'));
    deepZoom.overlap = Number(imageNode.getAttribute('Overlap'));
    deepZoom.format = imageNode.getAttribute('Format') || 'jpeg';
    deepZoom.width = Number(sizeNode.getAttribute('Width'));
    deepZoom.height = Number(sizeNode.getAttribute('Height'));
    deepZoom.maxLevel = Math.ceil(
      Math.log2(Math.max(deepZoom.width, deepZoom.height))
    );

    setStoryStatus('DZI ready');
  } catch (error) {
    console.warn('Could not read painting.dzi; using fallback metadata.', error);
    setStoryStatus('Using built-in metadata');
  }
}

function levelDimensions(level) {
  const divisor = Math.pow(2, deepZoom.maxLevel - level);
  return {
    width: Math.ceil(deepZoom.width / divisor),
    height: Math.ceil(deepZoom.height / divisor),
    divisor
  };
}

function fullRegionToLevel(region, level) {
  const { divisor } = levelDimensions(level);
  return {
    x: region.x / divisor,
    y: region.y / divisor,
    width: region.width / divisor,
    height: region.height / divisor
  };
}

function tileCoverage(level, col, row) {
  const dimensions = levelDimensions(level);
  const columns = Math.ceil(dimensions.width / deepZoom.tileSize);
  const rows = Math.ceil(dimensions.height / deepZoom.tileSize);

  if (col < 0 || row < 0 || col >= columns || row >= rows) return null;

  // DZI tiles contain overlap pixels around interior edges. Position the plane
  // using the actual pixel coverage instead of stretching every tile to 254px.
  const left = Math.max(0, col * deepZoom.tileSize - (col > 0 ? deepZoom.overlap : 0));
  const top = Math.max(0, row * deepZoom.tileSize - (row > 0 ? deepZoom.overlap : 0));
  const right = Math.min(
    dimensions.width,
    (col + 1) * deepZoom.tileSize + (col < columns - 1 ? deepZoom.overlap : 0)
  );
  const bottom = Math.min(
    dimensions.height,
    (row + 1) * deepZoom.tileSize + (row < rows - 1 ? deepZoom.overlap : 0)
  );

  return {
    left,
    top,
    width: right - left,
    height: bottom - top,
    levelWidth: dimensions.width,
    levelHeight: dimensions.height
  };
}

function tileUrl(level, col, row) {
  return `${deepZoom.folder}/${level}/${col}_${row}.${deepZoom.format}`;
}

function preloadImage(url) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(url);
    image.onerror = () => reject(new Error(`Could not load ${url}`));
    image.src = url;
  });
}

function createTilePlane(level, col, row, group) {
  const coverage = tileCoverage(level, col, row);
  if (!coverage) return;

  const worldW = coverage.width / coverage.levelWidth * deepZoom.worldWidth;
  const worldH = coverage.height / coverage.levelHeight * deepZoom.worldHeight;
  const centerX = (
    (coverage.left + coverage.width / 2) / coverage.levelWidth - 0.5
  ) * deepZoom.worldWidth;
  const centerY = (
    0.5 - (coverage.top + coverage.height / 2) / coverage.levelHeight
  ) * deepZoom.worldHeight;

  const tile = document.createElement('a-plane');
  tile.setAttribute('src', tileUrl(level, col, row));
  tile.setAttribute('width', worldW);
  tile.setAttribute('height', worldH);
  tile.setAttribute('position', `${centerX} ${centerY} 0`);
  tile.setAttribute(
    'material',
    'shader: flat; side: double; transparent: true; opacity: 0'
  );
  tile.setAttribute(
    'animation__fade',
    'property: material.opacity; from: 0; to: 1; dur: 300; easing: easeOutQuad'
  );
  group.appendChild(tile);
}

async function loadRegionAtLevel(region, level) {
  const dimensions = levelDimensions(level);
  const scaled = fullRegionToLevel(region, level);

  const startCol = Math.max(0, Math.floor(scaled.x / deepZoom.tileSize));
  const endCol = Math.min(
    Math.ceil(dimensions.width / deepZoom.tileSize) - 1,
    Math.floor((scaled.x + scaled.width - 1) / deepZoom.tileSize)
  );
  const startRow = Math.max(0, Math.floor(scaled.y / deepZoom.tileSize));
  const endRow = Math.min(
    Math.ceil(dimensions.height / deepZoom.tileSize) - 1,
    Math.floor((scaled.y + scaled.height - 1) / deepZoom.tileSize)
  );

  const coordinates = [];
  for (let row = startRow; row <= endRow; row++) {
    for (let col = startCol; col <= endCol; col++) {
      coordinates.push({ col, row });
    }
  }

  setStoryStatus(`Loading level ${level} (${coordinates.length} tiles)`);

  const results = await Promise.allSettled(
    coordinates.map(({ col, row }) => preloadImage(tileUrl(level, col, row)))
  );

  const group = document.createElement('a-entity');
  group.classList.add('story-tile-group');
  group.setAttribute('data-level', level);
  group.setAttribute('position', '0 0 0');

  results.forEach((result, index) => {
    if (result.status !== 'fulfilled') {
      console.warn(result.reason);
      return;
    }
    const { col, row } = coordinates[index];
    createTilePlane(level, col, row, group);
  });

  tileLayer.appendChild(group);

  // Keep the old level visible until the new level has faded in.
  setTimeout(() => {
    tileLayer.querySelectorAll('.story-tile-group').forEach(oldGroup => {
      if (oldGroup !== group) oldGroup.remove();
    });
  }, 340);

  return group;
}

function clearStoryTiles() {
  tileLayer.innerHTML = '';
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/*
 * Story scenes are expressed only in original-image pixel coordinates.
 * Fine-tune these rectangles later without changing the tile-loading code.
 */
const STORY = [
  {
    id: 'captain',
    title: {
      en: 'The Captain Steps Forward',
      ar: 'يتقدم القائد إلى الأمام'
    },
    region: { x: 6550, y: 5850, width: 1900, height: 3900 },
    narration: {
      en: 'Begin with Captain Frans Banninck Cocq. His dark clothing, red sash and extended hand establish the direction and authority of the scene.',
      ar: 'ابدأ بالكابتن فرانس بانينك كوك. تحدد ملابسه الداكنة ووشاحه الأحمر ويده الممدودة اتجاه المشهد وسلطته.'
    }
  },
  {
    id: 'lieutenant',
    title: {
      en: 'Light Meets Command',
      ar: 'يلتقي الضوء بالقيادة'
    },
    region: { x: 8050, y: 5650, width: 1900, height: 4100 },
    narration: {
      en: 'Beside him, the lieutenant’s luminous yellow costume creates a striking contrast and pulls the eye toward the central pair.',
      ar: 'إلى جانبه، يصنع زي الملازم الأصفر المضيء تباينًا قويًا ويجذب العين نحو الثنائي المركزي.'
    }
  },
  {
    id: 'girl',
    title: {
      en: 'The Symbolic Girl',
      ar: 'الفتاة الرمزية'
    },
    region: { x: 4400, y: 6200, width: 1700, height: 3000 },
    narration: {
      en: 'The illuminated girl is not simply another figure. Her light and symbolic objects connect the lively scene to the identity of the civic guard.',
      ar: 'الفتاة المضيئة ليست مجرد شخصية أخرى؛ فضوؤها وأغراضها الرمزية يربطان المشهد الحيوي بهوية الحرس المدني.'
    }
  },
  {
    id: 'drummer',
    title: {
      en: 'The Scene Finds Its Rhythm',
      ar: 'يجد المشهد إيقاعه'
    },
    region: { x: 12800, y: 6100, width: 2300, height: 3700 },
    narration: {
      en: 'At the right edge, the drummer and nearby dog introduce imagined sound, movement and the disorder of a company preparing to march.',
      ar: 'عند الحافة اليمنى، يضيف قارع الطبل والكلب القريب صوتًا متخيلاً وحركة وفوضى فرقة تستعد للسير.'
    }
  },
  {
    id: 'backgroundArch',
    title: {
      en: 'The Architecture Holds the Drama',
      ar: 'العمارة تحتضن الدراما'
    },
    region: { x: 6900, y: 1700, width: 4200, height: 2900 },
    narration: {
      en: 'Finally, the dark architecture frames the gathering. Against it, Rembrandt’s selective light turns a formal portrait into a dramatic event.',
      ar: 'أخيرًا، تؤطر العمارة الداكنة التجمع، ويحوّل ضوء رامبرانت الانتقائي الصورة الرسمية إلى حدث درامي.'
    }
  }
];

const storyEngine = {
  index: -1,
  running: false,
  token: 0,

  async start() {
    this.token += 1;
    this.index = 0;
    this.running = true;
    await this.showCurrent(this.token);
  },

  async next() {
    if (!this.running) {
      await this.start();
      return;
    }

    this.token += 1;
    this.index = (this.index + 1) % STORY.length;
    await this.showCurrent(this.token);
  },

  stop() {
    this.token += 1;
    this.running = false;
    this.index = -1;
    clearStoryTiles();
    hideInfo();
    setStoryStatus('Ready');
  },

  async showCurrent(token) {
    const scene = STORY[this.index];
    clearStoryTiles();
    hideInfo();

    const title = scene.title[currentLanguage || 'en'];
    setStoryStatus(`${this.index + 1}/${STORY.length}: ${title}`);

    // Progressive focus: a quick preview, a medium level, then full detail.
    for (const level of [10, 12, 14]) {
      if (token !== this.token || !this.running) return;
      await loadRegionAtLevel(scene.region, level);
      if (token !== this.token || !this.running) return;
      await wait(level === 14 ? 250 : 320);
    }

    const hotspot = document.querySelector(`#${scene.id}`);
    if (hotspot) {
      showHalo(scene.id);
      showInfo(scene.narration[currentLanguage || 'en'], hotspot);
    }

    setStoryStatus(`${this.index + 1}/${STORY.length}: look at ${title}`);
  }
};

window.addEventListener('keydown', event => {
  const key = event.key.toLowerCase();
  if (key === 's') storyEngine.start();
  if (key === 'n') storyEngine.next();
  if (key === 'c') storyEngine.stop();
});


let pageReady = false;
let currentLanguage = null;
let tourMode = null;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;
let infoTimer = null;

const galleryHotspots = [
  'captain','lieutenant','girl','drummer','flag',
  'musketeer','dog','leftGroup','rightGroup','backgroundArch'
];

const curatorHotspots = [
  ...galleryHotspots,
  'chickenClaws','drinkingHorn','weapons','spears',
  'light','shield','captainHand','redSash'
];

const hotspotTexts = {
  captain: {
    en: 'Captain Frans Banninck Cocq\n\nLeader of the Amsterdam civic guard company. In Curator’s Tour, selecting him reveals smaller details such as his hand and red sash.',
    ar: 'الكابتن فرانس بانينك كوك\n\nقائد فرقة الحرس المدني في أمستردام. في جولة القيّم الفني، يكشف اختياره عن تفاصيل أصغر مثل يده ووشاحه الأحمر.'
  },
  lieutenant: {
    en: 'Lieutenant Willem van Ruytenburch\n\nThe lieutenant stands beside the captain in bright yellow clothing, helping draw the viewer’s eye to the center.',
    ar: 'الملازم فيليم فان رويتنبرخ\n\nيقف بجانب القائد بملابس صفراء لامعة، مما يجذب نظر المشاهد نحو مركز اللوحة.'
  },
  girl: {
    en: 'The Illuminated Girl\n\nShe is not a regular militia member. She works as a symbolic figure, carrying objects connected to the identity of the civic guard.',
    ar: 'الفتاة المضيئة\n\nليست عضوة عادية في الحرس، بل تظهر كشخصية رمزية تحمل أشياء مرتبطة بهوية الفرقة.'
  },

function selectLanguage(language) {
  currentLanguage = language;

  if (language === 'ar') {
    languageBox.innerHTML = `
      <h1>الحراسة الليلية</h1>
      <p>اختر نوع الجولة</p>
      <div class="tourOption" onclick="selectTour('gallery')" style="text-align:right">
        <h2>جولة المعرض</h2>
        <p>تعرف على الشخصيات والعناصر الرئيسية.</p>
      </div>
      <div class="tourOption" onclick="selectTour('curator')" style="text-align:right">
        <h2>جولة القيّم الفني</h2>
        <p>اكتشف الرموز والتفاصيل الخفية.</p>
      </div>
      <div class="tourOption" onclick="selectTour('story')" style="text-align:right">
        <h2>القصة الموجّهة</h2>
        <p>دع تفاصيل اللوحة الواضحة تقود انتباهك خطوة بخطوة.</p>
      </div>
    `;
  } else {
    languageBox.innerHTML = `
      <h1>The Night Watch</h1>
      <p>Choose your tour</p>
      <div class="tourOption" onclick="selectTour('gallery')">
        <h2>Gallery Tour</h2>
        <p>Explore the main figures and key elements.</p>
      </div>
      <div class="tourOption" onclick="selectTour('curator')">
        <h2>Curator's Tour</h2>
        <p>Discover hidden symbols and details.</p>
      </div>
      <div class="tourOption" onclick="selectTour('story')">
        <h2>Guided Story</h2>
        <p>Let progressively sharpened details guide your attention through the painting.</p>
      </div>
    `;
  }
}

function selectTour(mode) {
  tourMode = mode;
  updateVisibleHotspots();
  startExperience();
}

function updateVisibleHotspots() {
  const allowedHotspots =
    tourMode === 'gallery' || tourMode === 'story'
      ? galleryHotspots
      : curatorHotspots;

  document.querySelectorAll('.hotspot').forEach(el => {
    const id = el.getAttribute('id');

    if (allowedHotspots.includes(id)) {
      if (el.classList.contains('captainDetail')) {
        el.setAttribute('visible', false);
      } else {
        el.setAttribute('visible', true);
      }
    } else {
      el.setAttribute('visible', false);
    }
  });
}

function showCaptainDetails() {
  if (tourMode !== 'curator') return;
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', true);
  });
}

function hideCaptainDetails() {
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', false);
  });
}

function getHaloForHotspot(id) {
  return document.querySelector('#' + id + 'Halo');
}

function showHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.setAttribute('visible', true);
  halo.setAttribute(
    'animation',
    'property: material.opacity; from:0.04; to:0.12; dur:2800; dir:alternate; loop:true'
  );
}

function hideHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.removeAttribute('animation');
  halo.setAttribute('visible', false);
}

function hideAllHalos() {
  Object.keys(hotspotTexts).forEach(id => hideHalo(id));
}

function makeCanvasTexture(text, language, width = 650, height = 250) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17, 17, 17, 0.68)';
  roundRect(ctx, 0, 0, width, height, 34);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '25px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 52, 38, width - 90, 46);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '24px Arial, sans-serif';
    drawWrappedText(ctx, text, 52, 38, width - 90, 46);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const texture = makeCanvasTexture(text, language);
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = texture;
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 800 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  if (pos.x > 0.8) panelX = pos.x - 0.68;

  let panelY = pos.y + 0.25;
  if (pos.y > 2.0) panelY = pos.y - 0.42;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(infoPanel, text, currentLanguage);
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  activeHotspot = null;
}

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage || !tourMode) return;

    const allowedHotspots =
      tourMode === 'gallery' || tourMode === 'story'
        ? galleryHotspots
        : curatorHotspots;

    if (!allowedHotspots.includes(id)) return;

    clearTimeout(infoTimer);
    clearTimeout(closeTimer);

    showHalo(id);

    infoTimer = setTimeout(() => {
      showInfo(hotspotTexts[id][currentLanguage], el);

      if (id === 'captain') {
        showCaptainDetails();
      }

      if (id !== 'captain' && !el.classList.contains('captainDetail')) {
        hideCaptainDetails();
      }
    }, 2000);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(infoTimer);
    hideHalo(id);
    hideInfo();
  });
}

function startExperience() {
  pageReady = true;
  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);

  const welcomeText =
    currentLanguage === 'ar'
      ? tourMode === 'gallery'
        ? 'بدأت جولة المعرض. انظر إلى العناصر الرئيسية في اللوحة.'
        : tourMode === 'curator'
          ? 'بدأت جولة القيّم الفني. اختر القائد لاكتشاف تفاصيل داخلية إضافية.'
          : 'بدأت القصة الموجّهة. ستزداد تفاصيل مناطق اللوحة وضوحًا لتقود انتباهك.'
      : tourMode === 'gallery'
        ? 'Gallery Tour started. Look at the main elements of the painting.'
        : tourMode === 'curator'
          ? "Curator's Tour started. Select the Captain to reveal inner details."
          : 'Guided Story started. Selected regions will progressively sharpen to guide your attention.';

  setPanelText(welcomePanel, welcomeText, currentLanguage);
  welcomePanel.setAttribute('visible', true);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);

    if (tourMode === 'story') {
      storyEngine.start();
    }
  }, 3500);
}

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('load', () => {
  loadDeepZoomMetadata();
  hideInfo();
  hideAllHalos();
  pageReady = false;
  currentLanguage = null;
  tourMode = null;
  gazeCursor.setAttribute('visible', false);

  document.querySelectorAll('.hotspot').forEach(el => {
    el.setAttribute('visible', false);
  });
});
</script>
